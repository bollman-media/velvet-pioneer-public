                <div class="lum3-dots" id="lum3-dots" aria-hidden="true"></div>

                <!-- Prompt label: fades in with the action pill, below the image -->
                <div class="lum3-prompt-label" id="lum3-prompt-label" aria-hidden="true">
                    <span class="lum3-prompt-label__text" id="lum3-prompt-text"></span>
                </div>

                <div class="lum-action-pill lum3-action-pill" id="lum3-action-pill">
                    <button class="lum-action-pill__btn" aria-label="Share"><span class="material-symbols-outlined">ios_share</span></button>
                    <button class="lum-action-pill__btn" aria-label="Copy"><span class="material-symbols-outlined">content_copy</span></button>
                    <button class="lum-action-pill__btn" aria-label="Download"><span class="material-symbols-outlined">download</span></button>
                    <button class="lum-action-pill__btn" aria-label="Edit"><span class="material-symbols-outlined">edit</span></button>
                </div>
            </div>

            <div class="video-floating-input" id="lum3-floating-input">
                <div class="video-floating-input__scrim"></div>
                <div class="video-floating-input__container">
                    <div class="video-floating-input__bg"></div>
                    <div class="video-floating-input__content">
                        <div class="video-floating-input__input-row">
                            <button class="video-floating-input__action-btn" id="lum3-float-add" aria-label="Add">
                                <span class="material-symbols-outlined">add</span>
                            </button>
                            <div class="video-floating-input__field">
                                <textarea class="video-floating-input__textarea" id="lum3-prompt-input" placeholder="Ask Gemini" rows="1"></textarea>
                                <span class="video-floating-input__placeholder">Ask Gemini</span>
                            </div>
                            <button class="video-floating-input__action-btn" id="lum3-float-mic" aria-label="Voice input">
                                <span class="material-symbols-outlined">mic</span>
                            </button>
                            <div class="video-floating-input__morph-container">
                                <button class="video-floating-input__action-btn" id="lum3-float-record" aria-label="Record">
                                    <span class="material-symbols-outlined">circle</span>
                                </button>
                                <button class="video-floating-input__send-btn" id="lum3-float-send" aria-label="Send">
                                    <span class="video-floating-input__send-circle"></span>
                                    <span class="material-symbols-outlined video-floating-input__send-icon">arrow_upward</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="gesture-bar video-gesture-bar">
                <div class="gesture-bar__handle"></div>
            </div>
        </div>
    </div><!-- /phone-shell option3 -->

    </div><!-- /prototype-container -->

    <script>
        // Live clock
        function updateTime() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes().toString().padStart(2, '0');
            const display = h + ':' + m;
            const el = document.getElementById('live-time');
            if (el) el.textContent = display;
        }
        updateTime();
        setInterval(updateTime, 10000);

        // ── Scroll Behavior (matches Video Editing studio) ──
        // studio: videoContent.addEventListener('scroll', () => videoGlassToolbar.classList.toggle('--scrolled'))
        const cardsScroll = document.getElementById('lum-content');
        const toolbar     = document.getElementById('lum-toolbar');

        // 1. Toolbar glass blur on scroll + top-fade blur activation
        if (cardsScroll && toolbar) {
            cardsScroll.addEventListener('scroll', () => {
                const scrolled = cardsScroll.scrollTop > 2;
                toolbar.classList.toggle('toolbar--scrolled', scrolled);
                // Activate the frosted-glass top veil once scrolling begins
                cardsScroll.classList.toggle('is-scrolled', scrolled);
            }, { passive: true });
        }

        // 2. Card entrance animation via IntersectionObserver
        //    Same principle as .video-card / videoCardIn in styles.css
        //    — cards below the fold animate in when they scroll into view
        const cards = document.querySelectorAll('.style-card');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('cards-visible');
                    observer.unobserve(entry.target); // once is enough
                }
            });
        }, {
            root: cardsScroll, // scroll container is the viewport for observation
            threshold: 0.05,   // trigger as soon as 5% of the card is visible
            rootMargin: '0px 0px 0px 0px'
        });

        cards.forEach(card => observer.observe(card));

        // 3. Card tap feedback (outline ripple)
        // Track selected style card
        let selectedStyle = 'salon'; // default
        cards.forEach(card => {
            card.addEventListener('click', () => {
                // Store selected style
                selectedStyle = card.dataset.style || 'salon';
                // Visual selection ring
                cards.forEach(c => c.classList.remove('is-selected'));
                card.classList.add('is-selected');
            });
        });

        // ── Floating input morph (record → send) — mirrors studio's video-float logic ──
        const inputRow    = document.getElementById('lum-input-row');
        const promptInput = document.getElementById('lum-prompt-input');

        if (promptInput && inputRow) {
            promptInput.addEventListener('input', () => {
                const hasText = promptInput.value.trim().length > 0;
                inputRow.classList.toggle('has-text', hasText);
                
                // Auto-expand
                promptInput.style.height = 'auto'; // Reset height to compute scrollHeight
                promptInput.style.height = (promptInput.scrollHeight) + 'px';
            });

            promptInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); // Prevent newline
                    document.getElementById('lum-float-send').click();
                }
            });

            // Tap anywhere on the pill to focus the textarea (studio pattern)
            document.getElementById('lum-floating-input').addEventListener('click', (e) => {
                if (!e.target.closest('button')) promptInput.focus();
            });

            // Send → trigger the full generation sequence (or stop if generating)
            document.getElementById('lum-float-send').addEventListener('click', () => {
                const shell = document.querySelector('.app-shell--video');
                const isGenerating = shell && shell.classList.contains('generating');
                const prompt = promptInput.value.trim();
                if (!prompt && !isGenerating) return;
                triggerGenerate(prompt, selectedStyle);
            });
        }

        // ─────────────────────────────────────────────────────────────
        //  GENERATION SEQUENCE — Choreographed Motion
        // ─────────────────────────────────────────────────────────────
        //
        //  ┌────────────────── TIMELINE ──────────────────────────────┐
        //  │  t=0ms    Keyboard dismissed                              │
        //  │  t=0-380ms Input pill collapses to compact state (.sub.) │
        //  │  t=100ms  Templates slow-blur (.blurring)                │
        //  │  t=700ms  Result panel is PLACED behind templates at y=0 │
        //  │           (invisible, directly behind template layer)    │
        //  │  t=750ms  Lockstep rise begins (.revealing):             │
        //  │           — template scroll container slides up          │
        //  │           — result panel was already there, now visible   │
        //  │  t=1200ms Templates fully off-screen. Reveal complete.   │
        //  │           .generating class added, back btn appears      │
        //  │  t=∞      Image renders in via blur→clarity transition   │
        //  └──────────────────────────────────────────────────────────┘

        const lumResult      = document.getElementById('lum-result');
        const lumResultBack  = document.getElementById('lum-result-back');

        // Cinematic Image History & Dual Slide Double Buffering
        let activeSlideIndex = 1;
        const imageHistory = [];
        let currentHistoryIndex = -1;

        function getCurrentMedia() {
            return document.getElementById(`lum-result-media-${activeSlideIndex}`);
        }

        function getCurrentSurface() {
            return document.getElementById(`lum-result-media-surface-${activeSlideIndex}`);
        }

        function toggleActiveSlide() {
            const currentSlide = document.getElementById(`lum-slide-${activeSlideIndex}`);
            activeSlideIndex = activeSlideIndex === 1 ? 2 : 1;
            const nextSlide = document.getElementById(`lum-slide-${activeSlideIndex}`);
            return { currentSlide, nextSlide };
        }

        let currentAbortController = null;

        function triggerGenerate(prompt, style) {
            const shell = document.querySelector('.app-shell--video');
            if (!shell) return;

            // If already generating, clicking send acts as a STOP action
            if (shell.classList.contains('generating')) {
                if (currentAbortController) {
                    currentAbortController.abort();
                    currentAbortController = null;
                }
                shell.classList.remove('generating');
                const p = shell.querySelector('.video-floating-input__placeholder');
                if (p) {
                    p.textContent = 'Ask Gemini';
                    p.style.opacity = 1;
                }
                const sendIcon = document.querySelector('#lum-float-send .video-floating-input__send-icon');
                if (sendIcon) sendIcon.textContent = 'arrow_upward';
                return;
            }

            const isSubsequent = lumResult.classList.contains('is-revealed');

            // Hoisted so img.onload closure can access them (block-scoped const would be invisible)
            let currentSlide, nextSlide, currentMedia, currentSurface, oldMedia;

            if (!isSubsequent) {
                // ── INITIAL GENERATION FLOW ──
                
                // ── t=0: Dismiss keyboard, clear input text ──
                if (promptInput) {
                    promptInput.value = '';
                    inputRow.classList.remove('has-text');
                    promptInput.style.height = 'auto'; // Reset the textarea height
                }

                if (window.dismissKeyboard) window.dismissKeyboard();

                shell.classList.remove('keyboard-open', 'keyboard-closing');
                shell.classList.add('submitting');
                
                // Hide toolbars immediately when loading
                lumResult.classList.remove('image-ready');

                const placeholder = shell.querySelector('.video-floating-input__placeholder');
                if (placeholder) {
                    placeholder.textContent = 'Loading...';
                    placeholder.style.opacity = 0.7;
                }

                const sendIcon = document.querySelector('#lum-float-send .video-floating-input__send-icon');
                if (sendIcon) sendIcon.textContent = 'stop';

                const micIcon = document.querySelector('#lum-float-mic .material-symbols-outlined');

                // ── t=100ms: Begin slow template blur ──
                setTimeout(() => {
                    shell.classList.add('blurring');
                }, 100);

                // ── t=700ms: Place result panel at y=0 (BEHIND templates, invisible) ──
                setTimeout(() => {
                    const currentMedia = getCurrentMedia();
                    if (currentMedia) currentMedia.className = 'lum-result__media is-loading';
                    lumResult.classList.add('is-placed');
                    // Hide prompt label during generation (reset from previous)
                    const pLabel = document.getElementById('lum1-prompt-label');
                    if (pLabel) pLabel.style.opacity = '0';
                }, 700);

                // ── t=750ms: Begin the lockstep rise ──
                setTimeout(() => {
                    shell.classList.add('revealing');
                }, 780);

                // ── t=1260ms: Templates have fully exited. Switch to full generating state ──
                setTimeout(() => {
                    shell.classList.remove('blurring', 'revealing', 'submitting');
                    shell.classList.add('generating');
                    lumResult.classList.add('is-revealed');

                    // Hide template content underneath
                    const h = document.getElementById('lum-content');
                    if (h) {
                        h.style.transition = 'opacity 480ms cubic-bezier(0.2, 0, 0, 1)';
                        h.style.opacity = '0';
                        h.style.pointerEvents = 'none';
                    }

                    // Snap chat scroll to immersive slot immediately (no animation, avoid flash of chat)
                    if (lumChatScroll && lumChatHistory) {
                        lumChatScroll.scrollTop = lumChatHistory.offsetHeight;
                    }
                }, 1260);

            } else {
                // ── SUBSEQUENT GENERATION FLOW (Kinetic Continuity) ──
                
                if (promptInput) {
                    promptInput.value = '';
                    inputRow.classList.remove('has-text');
                    promptInput.style.height = 'auto'; // Reset the textarea height
                }
                if (window.dismissKeyboard) window.dismissKeyboard();
                
                shell.classList.add('generating'); // Instantly go to generating state
                lumResult.classList.remove('is-loaded', 'image-ready'); // Clear old success state

                // Append previous turn to chat history if it exists
                if (imageHistory.length > 0) {
                    const prev = imageHistory[imageHistory.length - 1];
                    appendChatTurn(prev.prompt, prev.dataUrl);
                }

                // Ensure we are in immersive UX while loading
                lumResult.classList.remove('in-chat-mode');
                scrollToImmersive(false);
                
                // Removed immediate prompt hiding: 
                // The old label stays visible to ascend alongside the outgoing image later.
                const placeholder = shell.querySelector('.video-floating-input__placeholder');
                if (placeholder) {
                    placeholder.textContent = 'Loading...';
                    placeholder.style.opacity = 0.7;
                }

                const sendIcon = document.querySelector('#lum-float-send .video-floating-input__send-icon');
                if (sendIcon) sendIcon.textContent = 'stop';
                
                const micIcon = document.querySelector('#lum-float-mic .material-symbols-outlined');

                ({ currentSlide, nextSlide } = toggleActiveSlide()); // assigns to outer lets
                currentMedia   = getCurrentMedia();     // media el on the new slide
                currentSurface = getCurrentSurface();   // surface el on the new slide
                oldMedia = currentSlide.querySelector('.lum-result__media');

                // ── STEP 1: Fade out old sharp surface ───────────────────────────────────────
                // The old blurry bg stays fully visible — a warm environmental
                // placeholder so the user stays oriented while generating.
                const oldSurface = currentSlide.querySelector('.lum-result__media-surface');
                if (oldSurface) {
                    oldSurface.style.transition = 'none'; 
                    oldSurface.style.opacity = '1';       // Keep perfectly visible while new image loads
                    if (oldSurface.exitAnimation) {
                        oldSurface.exitAnimation.cancel();
                        oldSurface.exitAnimation = null;
                    }
                }

                // ── STEP 2: Stack new slide above as a transparent overlay ───────────
                // New slide has no bg image and no surface yet — fully see-through.
                // User looks through it to the old blurry bg below.
                nextSlide.style.zIndex = '3';
                nextSlide.style.opacity = '1';
                nextSlide.style.pointerEvents = 'auto';

                currentMedia.className = 'lum-result__media';
                currentMedia.style.backgroundImage = '';
                currentMedia.style.opacity = '0';
                currentMedia.style.transform = 'none';
                currentMedia.style.transition = 'none';

                if (currentSurface) {
                    currentSurface.innerHTML = '';
                    currentSurface.style.opacity = '0';
                    currentSurface.style.transform = 'scale(1)'; // explicit: avoids CSS scale(0.92) default
                    currentSurface.style.transition = 'none';
                    if (currentSurface.exitAnimation) {
                        currentSurface.exitAnimation.cancel();
                        currentSurface.exitAnimation = null;
                    }
                }
            }

            currentAbortController = new AbortController();

            // ── t=∞: Image generation API ──
            generateFashionImage(prompt, style, currentAbortController.signal)
                .then(dataUrl => {
                    // Reset stop icon and placeholder on success
                    const sendIcon = document.querySelector('#lum-float-send .video-floating-input__send-icon');
                    if (sendIcon) sendIcon.textContent = 'arrow_upward';
                    
                    const micIcon = document.querySelector('#lum-float-mic .material-symbols-outlined');
                    
                    const p = shell.querySelector('.video-floating-input__placeholder');
                    if (p) {
                        p.textContent = 'Ask Gemini';
                        p.style.opacity = '';
                    }
                    currentAbortController = null;

                    if (!dataUrl) return;
                    
                    // Push to history if new
                    if (currentHistoryIndex === imageHistory.length - 1) {
                        imageHistory.push({ dataUrl, prompt });
                        currentHistoryIndex = imageHistory.length - 1;
                    }

                    const img = new Image();
                    img.onload = () => {
                        if (shell) shell.classList.remove('generating');
                        lumResult.classList.add('image-ready');

                        if (isSubsequent) {
                            // ── Cinematic Motion: Animate old image and old prompt ascending ──
                            const theOldSurface = currentSlide.querySelector('.lum-result__media-surface');
                            const pLabelToClone = document.getElementById('lum1-prompt-label');
                            let oldLabelClone = null;
                            
                            if (pLabelToClone && window.getComputedStyle(pLabelToClone).opacity !== '0') {
                                oldLabelClone = pLabelToClone.cloneNode(true);
                                oldLabelClone.id = ''; // Disconnect ID
                                // Position it absolutely over the original
                                const rect = pLabelToClone.getBoundingClientRect();
                                const parentRect = pLabelToClone.parentElement.getBoundingClientRect();
                                oldLabelClone.style.position = 'absolute';
                                oldLabelClone.style.top = (rect.top - parentRect.top) + 'px';
                                oldLabelClone.style.left = (rect.left - parentRect.left) + 'px';
                                oldLabelClone.style.bottom = 'auto';
                                oldLabelClone.style.right = 'auto';
                                oldLabelClone.style.margin = '0';
                                oldLabelClone.style.zIndex = '50'; // Ensure above overlapping layers during ascent
                                pLabelToClone.parentElement.appendChild(oldLabelClone);

                                // Hide the original instantly so it's ready to update text for the incoming image
                                pLabelToClone.style.transition = 'none';
                                pLabelToClone.style.opacity = '0';
                                pLabelToClone.style.transform = 'translateY(16px)';
                            }

                            // Update the REAL prompt text for the incoming image
                            const pText = document.getElementById('lum1-prompt-text');
                            if (pLabelToClone && pText) {
                                pText.textContent = prompt || '';
                                void pLabelToClone.offsetWidth; // Force reflow
                                // Delayed by 400ms to align with the new image fade-in
                                pLabelToClone.style.transition = 'opacity 500ms ease 400ms, transform 500ms cubic-bezier(0.16, 1, 0.3, 1) 400ms';
                                pLabelToClone.style.opacity = '1';
                                pLabelToClone.style.transform = 'translateY(0)';
                            }

                            // STEP 3: New sharp surface fades in sequentially AFTER old one clears
                            currentMedia.style.backgroundImage = `url(${dataUrl})`;
                            if (currentSurface) {
                                currentSurface.innerHTML = `<img src="${dataUrl}" class="lum-surface-img" alt="Generated Fashion" />`;
                                requestAnimationFrame(() => requestAnimationFrame(() => {
                                    // Delayed by 400ms to allow the old image to move out of the way first
                                    currentSurface.style.transition = 'opacity 600ms cubic-bezier(0.16, 1, 0.3, 1) 400ms';
                                    currentSurface.style.opacity = '1';
                                }));
                            }

                            if (theOldSurface) {
                                theOldSurface.style.transition = 'none';
                                theOldSurface.style.opacity = '0';
                                
                                const animKeyframes = [
                                    { transform: 'translateY(0px) scale(1)', opacity: 1, filter: 'brightness(1) blur(0px)', offset: 0 },
                                    { opacity: 0.8, offset: 0.4 }, // Opacity fades slowly at the beginning
                                    { transform: 'translateY(-600px) scale(0.9)', opacity: 0, filter: 'brightness(1.2) blur(16px)', offset: 1 }
                                ];
                                const animTiming = { duration: 1200, easing: 'ease-out', fill: 'forwards' };
                                
                                // Beautiful, premium exit motion preserving scale
                                theOldSurface.exitAnimation = theOldSurface.animate(animKeyframes, animTiming);

                                if (oldLabelClone) {
                                    const labelAnim = oldLabelClone.animate([
                                        { transform: 'translateY(0px)', opacity: 1, filter: 'blur(0px)', offset: 0 },
                                        { opacity: 0.8, offset: 0.4 },
                                        { transform: 'translateY(-600px)', opacity: 0, filter: 'blur(16px)', offset: 1 }
                                    ], animTiming);
                                    labelAnim.onfinish = () => oldLabelClone.remove();
                                }
                            }

                            // STEP 4: Cross-fade blurry bgs (old out / new in)
                            // Begins once new surface is mostly opaque — the bg swap
                            // is invisible beneath the sharp image.
                            setTimeout(() => {
                                // Add is-loaded now so CSS brightness(1) applies before the
                                // fade starts — avoids the bg appearing dark during cross-dissolve.
                                currentMedia.className = 'lum-result__media is-loaded';
                                currentMedia.style.transition = 'opacity 540ms cubic-bezier(0.22, 1, 0.36, 1)';
                                currentMedia.style.opacity = '1';
                                if (oldMedia) {
                                    oldMedia.style.transition = 'opacity 540ms cubic-bezier(0.22, 1, 0.36, 1)';
                                    oldMedia.style.opacity = '0';
                                }
                                setTimeout(() => {
                                    lumResult.classList.add('is-loaded');
                                    currentSlide.style.zIndex = '1';
                                    currentSlide.style.opacity = '0';
                                    currentSlide.style.pointerEvents = 'none';
                                    if (oldMedia) oldMedia.style.opacity = '';
                                    scrollToImmersive(false);
                                }, 560);
                            }, 400);

                        } else {
                            // ── INITIAL PATH: simple reveal ──────────────────────────────────
                            // Update the REAL prompt text
                            const pLabel = document.getElementById('lum1-prompt-label');
                            const pText = document.getElementById('lum1-prompt-text');
                            if (pLabel && pText) {
                                pText.textContent = prompt || '';
                                void pLabel.offsetWidth; // Force reflow
                                pLabel.style.transition = 'opacity 500ms ease, transform 500ms cubic-bezier(0.16, 1, 0.3, 1)';
                                pLabel.style.opacity = '1';
                                pLabel.style.transform = 'translateY(0)';
                            }

                            const activeMedia   = getCurrentMedia();
                            const activeSurface = getCurrentSurface();
                            activeMedia.style.backgroundImage = `url(${dataUrl})`;
                            if (activeSurface) {
                                activeSurface.innerHTML = `<img src="${dataUrl}" class="lum-surface-img" alt="Generated Fashion" />`;
                                // Inline opacity bypasses the CSS cascade conflict (in-chat-mode wins over is-loaded at equal specificity)
                                activeSurface.style.transition = 'none';
                                activeSurface.style.opacity = '0';
                                activeSurface.style.transform = 'scale(1)';
                            }
                            requestAnimationFrame(() => requestAnimationFrame(() => {
                                activeMedia.className = 'lum-result__media is-loaded';
                                lumResult.classList.add('is-loaded');
                                if (activeSurface) {
                                    activeSurface.style.transition = 'opacity 800ms ease';
                                    activeSurface.style.opacity = '1'; // inline wins over any CSS class
                                }
                                const slide = document.getElementById(`lum-slide-${activeSlideIndex}`);
                                if (slide) { slide.style.opacity = '1'; slide.style.zIndex = '3'; }
                                scrollToImmersive(false);
                                // After reveal transition, restore CSS control so in-chat-mode can hide surface normally
                                setTimeout(() => {
                                    if (activeSurface) {
                                        activeSurface.style.transition = '';
                                        activeSurface.style.opacity = '';
                                        activeSurface.style.transform = '';
                                    }
                                }, 950);
                            }));
                        }
                    };
                    img.src = dataUrl;

                })
                .catch(err => {
                    if (err.name === 'AbortError') {
                        console.log('[Luminous] Generation aborted by user.');
                    } else {
                        console.error('[Luminous] Generation failed:', err);
                    }
                    // Reset on error
                    const sendIcon = document.querySelector('#lum-float-send .video-floating-input__send-circle');
                    if (sendIcon) sendIcon.textContent = 'arrow_upward';
                    const micIcon = document.querySelector('#lum-float-mic .material-symbols-outlined');
                    
                    if (shell) shell.classList.remove('generating');
                    const p = shell.querySelector('.video-floating-input__placeholder');
                    if (p) {
                        p.textContent = 'Ask Gemini';
                        p.style.opacity = '';
                    }
                });
        }

        async function generateFashionImage(promptMsg, style, signal) {
            console.log(`[Luminous] 🎨 Generation Request: "${promptMsg.substring(0, 40)}..." [Style: ${style}]`);
            
            // Priority: Direct API Call (Compatibility fallback for Zipline/Static hosts)
            let apiKey = localStorage.getItem('gemini_api_key') || '';
            const STYLE_DIRECTION = {
                'salon':          'Luxury salon portrait: warm golden-hour lighting, soft film halation, elegant neutral palette, shot on Hasselblad',
                'monochrome':     'High-contrast black and white editorial: deep shadows, specular highlights, Helmut Newton gravitas, 35mm grain',
                'color-blocking': 'Bold color-blocking fashion: saturated primaries, Mondrian geometry, graphic flat planes, studio lighting',
                'cyborg':         'Cyberpunk editorial: cool neon accents, chrome metallic surfaces, blue-violet atmospheric haze, sharp geometric glitch',
                'surreal':        'Surrealist fashion: Dali-esque impossible dreamscape, rich warm textures, floating elements, painterly depth',
                'gothic-clay':    'Gothic sculptural clay: muted earthy terracotta, textured matte surfaces, deep shadows, moody candlelight',
                'risograph':      'Risograph print aesthetic: limited flat color palette, misregistered ink layers, coarse halftone grain, zine culture',
                'steampunk':      'Steampunk editorial: warm sepia-amber palette, brass clockwork details, Victorian silhouette, steam diffusion',
                'explosive':      'High-energy dynamic fashion: kinetic motion blur, dramatic wide composition, bold silhouette against graphic backdrop',
                'oil-painting':   'Oil painting fashion portrait: classical old-master chiaroscuro, impasto brushwork, rich glazed pigment, timeless gravitas',
                'runway':         'Avant-garde runway editorial: stark white catwalk, dramatic side lighting, architectural silhouette, fashion-week energy',
                'old-cartoon':    'Vintage 1930s animation cel: bold ink outlines, flat primary fills, soft sepia tint, nostalgic cel-shaded charm'
            };

            const styleDesc = STYLE_DIRECTION[style] || 'Cinematic editorial fashion photography, medium format analog, warm film grain';
            const fashionPrompt = `You are a world-class fashion photographer and creative director.\n\nArt direction: ${styleDesc}\n\nCreate a stunning editorial fashion image based on this brief:\n"${promptMsg}"\n\nRequirements:\n- Full-bleed immersive composition, edge to edge\n- No text, watermarks, or graphic overlays\n- Magazine editorial quality — could run in Vogue or System Magazine\n- Authentic analog film grain and natural imperfections\n- Extraordinary lighting that defines the mood and space\n- Rich tonal depth with beautiful color science\n- If figure/people are present, treat them with dignity and artfulness`;

            const MODEL = 'gemini-2.5-flash-image';
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;

            try {
                console.log(`[Luminous] Attempting direct API call to ${MODEL}...`);
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': apiKey,
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: fashionPrompt }] }],
                        generationConfig: {
                            responseModalities: ['IMAGE', 'TEXT']
                        }
                    }),
                    signal: signal
                });

                if (!res.ok) {
                    if (res.status === 400 || res.status === 403) {
                        localStorage.removeItem('gemini_api_key');
                    }
                    const errText = await res.text();
                    throw new Error(`HTTP ${res.status}: ${errText.substring(0, 200)}`);
                }
                const json = await res.json();
                const parts = json?.candidates?.[0]?.content?.parts || [];
                const imgPart = parts.find(p => p.inlineData);
                
                if (!imgPart) throw new Error('No image in server response');
                console.log('[Luminous] ✅ Success via Direct API');
                return `data:${imgPart.inlineData.mimeType || 'image/png'};base64,${imgPart.inlineData.data}`;
            } catch (e) {
                if (e.name === 'AbortError') {
                    console.log('[Luminous] 🛑 Generation aborted by user');
                    return null;
                }
                console.error('[Luminous] ❌ All generation methods failed:', e);
                alert(`API Error: ${e.message}`);
                return null;
            }
        }
        // Export to window so Option 2 (option2.js) can access it
        window.generateFashionImage = generateFashionImage;

        // ── Aspect Ratio Detection Utility ──────────────────────────────────
        // Parses prompt text for common aspect ratio keywords (e.g. "9:16",
        // "16:9", "landscape", "portrait", "wide", "tall", "4:3", "3:2")
        // and returns a CSS aspect-ratio string. Defaults to "1 / 1".
        // Used by shimmer boxes and image wraps BEFORE the image arrives.
        function detectAspectRatioFromPrompt(promptText) {
            if (!promptText) return '1 / 1';
            const t = promptText.toLowerCase();
            // Explicit ratio patterns: "9:16", "16:9", "4:3", "3:2", "2:3", "3:4", "1:1", "21:9"
            const ratioMatch = t.match(/\b(\d{1,2})\s*[:/×x]\s*(\d{1,2})\b/);
            if (ratioMatch) {
                const w = parseInt(ratioMatch[1], 10);
                const h = parseInt(ratioMatch[2], 10);
                if (w > 0 && h > 0 && w <= 21 && h <= 21) {
                    return `${w} / ${h}`;
                }
            }
            // Keyword-based detection
            if (/\b(portrait|tall|vertical)\b/.test(t)) return '3 / 4';
            if (/\b(landscape|wide|horizontal|panoramic|pano)\b/.test(t)) return '4 / 3';
            if (/\b(widescreen|cinematic|ultrawide)\b/.test(t)) return '16 / 9';
            if (/\b(story|stories|reel|reels)\b/.test(t)) return '9 / 16';
            return '1 / 1';
        }
        window.detectAspectRatioFromPrompt = detectAspectRatioFromPrompt;

        // Apply the detected aspect ratio to a container element.
        // Also sets up an onload handler on the img to refine with actual dimensions.
        function applyImageAspectRatio(wrapEl, imgEl, promptText) {
            // Step 1: Apply prompt-detected ratio immediately
            const detectedRatio = detectAspectRatioFromPrompt(promptText);
            wrapEl.style.aspectRatio = detectedRatio;

            // Step 2: When image loads, refine with actual natural dimensions
            if (imgEl) {
                const refine = () => {
                    const nw = imgEl.naturalWidth;
                    const nh = imgEl.naturalHeight;
                    if (nw > 0 && nh > 0) {
                        wrapEl.style.aspectRatio = `${nw} / ${nh}`;
                    }
                };
                if (imgEl.complete && imgEl.naturalWidth > 0) {
                    refine();
                } else {
                    imgEl.addEventListener('load', refine, { once: true });
                }
            }
        }
        window.applyImageAspectRatio = applyImageAspectRatio;


        const lumChatScroll = document.getElementById('lum-chat-scroll');
        const lumChatHistory = document.getElementById('lum-chat-history');
        const lumToolbar = document.getElementById('lum-toolbar');
        const lumActionPill = document.querySelector('.lum-action-pill');
        const lumImmersiveSlot = document.getElementById('lum-immersive-slot');
        const lumChatFab = document.getElementById('lum-chat-fab');
        const sysUi = document.querySelector('.sys-ui');

        // Scroll chat panel to immersive slot (bottom)
        function scrollToImmersive(animate = true) {
            if (!lumChatScroll) return;
            const target = lumChatHistory.offsetHeight;
            lumChatScroll.scrollTo({ top: target, behavior: animate ? 'smooth' : 'instant' });
        }

        // Append a completed turn (prompt + image) to the chat history
        function appendChatTurn(promptText, dataUrl) {
            if (!lumChatHistory) return;
            const turn = document.createElement('div');
            turn.className = 'lum-chat-turn';
            turn.innerHTML = `
                <div class="lum-chat-bubble">${promptText}</div>
                <div class="lum-chat-image-wrap">
                    <img src="${dataUrl}" alt="Generated image" loading="lazy" />
                </div>
                <div class="lum-chat-actions">
                    <img src="assets/action_bar.png" alt="Actions" style="width: 370px; height: 34px;" />
                </div>`;
            lumChatHistory.appendChild(turn);
            // Apply aspect ratio — prompt-based first, then refined on image load
            const wrap = turn.querySelector('.lum-chat-image-wrap');
            const img  = turn.querySelector('.lum-chat-image-wrap img');
            if (wrap && window.applyImageAspectRatio) {
                window.applyImageAspectRatio(wrap, img, promptText);
            }
        }

        // ── SOVEREIGN MOTION: Multi-layer Parallax Immersive → Chat ──────────
        //
        // Three depth planes — each scrolls at its own rate ("parallax factor"):
        //
        //   Plane              Rate    Offset factor   Feel
        //   ─────────────────────────────────────────────────────────────────
        //   Slides / image     0.35×     × 0.65       Far behind glass
        //   Orbs / atmosphere  0.55×     × 0.45       Drifting mist
        //   Environment light  0.80×     × 0.20       Near surface
        //   Chat content       1.00×     × 0.00       Foreground (natural)
        //
        // Offset = userScrolledUp × (1 − rate)
        // Pushed DOWN so the layer appears to be further away & moves slower.

        let scrollRafId = null;
        const CHAT_REVEAL_THRESHOLD = 120;

        // Orb depth table (inner parallax variation per orb)
        const ORB_DEFS = [
            { cls: 'lum-result__orb1', innerRate: 1.00 },
            { cls: 'lum-result__orb2', innerRate: 0.82 },
            { cls: 'lum-result__orb3', innerRate: 0.65 },
        ];

        function onChatScroll() {
            if (scrollRafId) return;
            scrollRafId = requestAnimationFrame(() => {
                scrollRafId = null;

                const scrolled   = lumChatScroll.scrollTop;
                const histHeight = lumChatHistory.offsetHeight;

                // px the user has scrolled ABOVE the immersive floor
                const userScrolledUp = Math.max(0, histHeight - scrolled);

                // ── Toolbar: fade out the moment user scrolls AT ALL ──────────
                if (userScrolledUp > 2 && lumResult.classList.contains('image-ready')) {
                    lumResult.classList.remove('image-ready');
                }

                // ── Guard: if at rest in the immersive view, clear all overrides ──
                // The existing CSS animations handle the dark-space look; we must not
                // stomp them with JS inline styles when t=0.
                if (userScrolledUp <= 2) {
                    const slidesEl = lumResult.querySelector('.lum-slides-container');
                    if (slidesEl) {
                        slidesEl.style.transform    = '';
                        slidesEl.style.borderRadius = '';
                        slidesEl.style.filter       = '';
                        slidesEl.style.boxShadow    = '';
                        slidesEl.style.transition   = '';
                        slidesEl.style.opacity      = '';
                    }
                    ORB_DEFS.forEach(({ cls }) => {
                        const orb = lumResult.querySelector('.' + cls);
                        if (orb) { orb.style.transform = ''; orb.style.opacity = ''; orb.style.transition = ''; }
                    });
                    const envEl = lumResult.querySelector('.lum-result__env');
                    if (envEl) { envEl.style.background = ''; envEl.style.transform = ''; }
                    const inputBg = document.querySelector('.video-floating-input__bg');
                    if (inputBg) { inputBg.style.background = ''; }
                    const promptLabel = lumResult.querySelector('.lum1-prompt-label');
                    if (promptLabel) { promptLabel.style.transform = ''; promptLabel.style.opacity = ''; promptLabel.style.transition = ''; }

                    if (lumResult.classList.contains('in-chat-mode')) {
                        lumResult.classList.remove('in-chat-mode');
                    }
                    if (lumChatFab) lumChatFab.classList.remove('is-visible');
                    return; // ← no parallax at rest
                }

                // Normalised morph progress: 0 = full immersive, 1 = full chat
                const raw = 1 - Math.max(0, Math.min(1, userScrolledUp / CHAT_REVEAL_THRESHOLD));
                const t   = raw < 0.5
                    ? 4 * raw * raw * raw
                    : 1 - Math.pow(-2 * raw + 2, 3) / 2;

                if (sysUi) {
                    sysUi.classList.toggle('theme-white-text', t < 0.5);
                }

                const isInChat  = userScrolledUp < (CHAT_REVEAL_THRESHOLD + 80);
                const wasInChat = lumResult.classList.contains('in-chat-mode');

                // ── Parallax offsets (positive Y = translated DOWN = lags behind) ─
                const slidesParY = userScrolledUp * 0.35;   // reduced rate to limit translation gaps
                const orbsParY   = userScrolledUp * 0.45;   // orbs:  0.55× scroll rate
                const envParY    = userScrolledUp * 0.20;   // env:   0.80× scroll rate

                // ── Layer 1: Slides — completely fades out as chat reveals ──
                const slidesEl = lumResult.querySelector('.lum-slides-container');
                if (slidesEl) {
                    const scale  = 1.22 - t * 0.22;              // 1.22 → 1.0 (heavy bleed to hide edge gaps)
                    const morphY = -(t * 16);                  // subtle upward morph pull
                    const y      = slidesParY + morphY;        // parallax lag + morph combined

                    slidesEl.style.transition   = 'none';
                    slidesEl.style.transform    = `translateY(${y}px) scale(${scale})`;
                    slidesEl.style.borderRadius = `${t * 40}px`;
                    slidesEl.style.overflow     = 'hidden';
                    slidesEl.style.filter       = `brightness(${1 - t * 0.12})`;
                    slidesEl.style.boxShadow    = `0 ${8 + t*24}px ${40 + t*60}px rgba(0,0,0,${t * 0.20})`;
                }

                // ── Prompt Label — fade out smoothly as we scroll into chat ──
                const promptLabel = lumResult.querySelector('.lum1-prompt-label');
                if (promptLabel) {
                    promptLabel.style.transition = 'none';
                    // t goes from 1 (immersive) down to 0 (chat). So we fade out rapidly by using t.
                    // When t = 1, opacity = 1. When t < 0.6, opacity hits 0.
                    promptLabel.style.opacity = String(Math.max(0, (t - 0.5) * 2));
                    promptLabel.style.transform = `translateY(${-( (1 - t) * 16 )}px)`;
                }

                // ── Layer 2: Orbs — mid-atmosphere, each at its own sub-depth ────
                ORB_DEFS.forEach(({ cls, innerRate }) => {
                    const orb = lumResult.querySelector('.' + cls);
                    if (!orb) return;
                    orb.style.transition = 'none';
                    orb.style.transform  = `translateY(${orbsParY * innerRate}px)`;
                    // Orbs fade as we move out of immersive space
                    orb.style.opacity    = String(Math.max(0, 1 - t * 2.4));
                });

                // ── Layer 3: Environment — near-surface light plane ───────────────
                // Interpolates from transparent (letting the existing dark CSS show)
                // to cream (rgba(253,251,251)) as t → 1
                const envEl = lumResult.querySelector('.lum-result__env');
                if (envEl) {
                    // Fade heavily to cream early to avoid muddy gray blending
                    const envAlpha = Math.min(1, t * 2.5); 
                    envEl.style.transition = 'none';
                    // Overlay a cream wash proportional to t
                    envEl.style.background = `rgba(253, 251, 251, ${envAlpha})`;
                    envEl.style.transform  = ''; // remove parallax gap
                }

                const inputBg = document.querySelector('.video-floating-input__bg');
                if (inputBg && t > 0.05) {
                    const r = Math.round(t * 253);
                    const g = Math.round(t * 251);
                    const b = Math.round(t * 251);
                    inputBg.style.transition = 'none';
                    inputBg.style.background = `rgba(${r},${g},${b},${0.12 + t * 0.78})`;
                }

                // ── State class → triggers CSS-driven cascade ─────────────────────
                if (isInChat !== wasInChat) {
                    if (isInChat) {
                        lumResult.classList.add('in-chat-mode');
                        // Re-enable spring transitions once scroll settles so
                        // snap-back to immersive is cinematically sprung
                        if (slidesEl) {
                            setTimeout(() => {
                                slidesEl.style.transition =
                                    'transform     1100ms cubic-bezier(0.19,1,0.22,1),' +
                                    'border-radius  980ms cubic-bezier(0.19,1,0.22,1),' +
                                    'filter        1100ms cubic-bezier(0.19,1,0.22,1),' +
                                    'opacity       800ms ease,' +
                                    'box-shadow    1100ms cubic-bezier(0.19,1,0.22,1)';
                            }, 17);
                        }
                    } else {
                        // ── Spring everything home — each layer at its own rate ──
                        lumResult.classList.remove('in-chat-mode');

                        if (slidesEl) {
                            slidesEl.style.transition =
                                'transform     1100ms cubic-bezier(0.19,1,0.22,1),' +
                                'border-radius  980ms cubic-bezier(0.19,1,0.22,1),' +
                                'filter        1100ms cubic-bezier(0.19,1,0.22,1),' +
                                'box-shadow    1100ms cubic-bezier(0.19,1,0.22,1)';
                            slidesEl.style.transform    = 'translateY(0) scale(1)';
                            slidesEl.style.borderRadius = '0';
                            slidesEl.style.filter       = 'none';
                            slidesEl.style.boxShadow    = 'none';
                        }

                        // Orbs use neighbouring prime durations for organic unsync
                        ORB_DEFS.forEach(({ cls, innerRate }, i) => {
                            const orb = lumResult.querySelector('.' + cls);
                            if (!orb) return;
                            const dur = [877, 929, 983][i]; // prime-number stagger
                            orb.style.transition = `transform ${dur}ms cubic-bezier(0.19,1,0.22,1), opacity 600ms cubic-bezier(0.4,0,0.2,1)`;
                            orb.style.transform  = 'translateY(0)';
                            orb.style.opacity    = '1';
                        });

                        if (envEl) {
                            envEl.style.transition = 'transform 1200ms cubic-bezier(0.19,1,0.22,1), background 800ms cubic-bezier(0.19,1,0.22,1)';
                            envEl.style.transform  = 'translateY(0)';
                            envEl.style.background = '';
                        }

                        if (inputBg) {
                            inputBg.style.transition = 'background 640ms cubic-bezier(0.19,1,0.22,1)';
                            inputBg.style.background = '';
                        }
                    }
                }

                if (lumChatFab) {
                    const hasTurns = lumChatHistory.children.length > 1;
                    lumChatFab.classList.toggle('is-visible', isInChat && hasTurns);
                }
            });
        }

        if (lumChatScroll) {
            lumChatScroll.addEventListener('scroll', onChatScroll, { passive: true });
        }


        // FAB: jump back to immersive
        if (lumChatFab) {
            lumChatFab.addEventListener('click', () => scrollToImmersive(true));
        }

        // Back button — dismiss result and return to templates
        if (lumResultBack) {
            lumResultBack.addEventListener('click', () => {
                const shell = document.querySelector('.app-shell--video');

                // If we're in chat mode, first scroll to immersive, then after a tick go back
                if (lumResult.classList.contains('in-chat-mode')) {
                    scrollToImmersive(true);
                    return;
                }

                // Animate result panel sliding back down
                lumResult.classList.remove('is-revealed');
                lumResult.style.transition = 'transform 640ms cubic-bezier(0.4, 0, 0.2, 1)';
                lumResult.style.transform  = 'translateY(100%)';

                // Fade back in the toolbar and content simultaneously
                const toolbar = document.getElementById('lum-toolbar');
                const content = document.getElementById('lum-content');
                if (toolbar) {
                    toolbar.style.transition = 'opacity 480ms cubic-bezier(0.2, 0, 0, 1) 100ms, transform 480ms cubic-bezier(0.2, 0, 0, 1) 100ms';
                    toolbar.style.opacity = '1';
                    toolbar.style.transform = 'translateY(0)';
                }
                if (content) {
                    content.style.transition = 'transform 600ms cubic-bezier(0.2, 0, 0, 1) 80ms, opacity 400ms cubic-bezier(0.2, 0, 0, 1) 80ms, filter 400ms cubic-bezier(0.2, 0, 0, 1) 80ms';
                    content.style.transform = 'translateY(0)';
                    content.style.opacity = '1';
                    content.style.filter = 'none';
                }

                // Restore placeholder text
                const placeholder = shell ? shell.querySelector('.video-floating-input__placeholder') : null;
                if (placeholder) placeholder.textContent = 'Ask Gemini';

                // Remove all state classes
                if (shell) shell.classList.remove('generating', 'submitting', 'blurring', 'revealing');

                // After exit completes, fully reset result panel and inline styles
                setTimeout(() => {
                    lumResult.setAttribute('aria-hidden', 'true');
                    lumResult.className = 'lum-result';
                    lumResult.style.transition = '';
                    lumResult.style.transform  = '';
                    
                    // Clear both slide channels
                    const m1 = document.getElementById('lum-result-media-1');
                    const s1 = document.getElementById('lum-result-media-surface-1');
                    const m2 = document.getElementById('lum-result-media-2');
                    const s2 = document.getElementById('lum-result-media-surface-2');
                    if (m1) { m1.className = 'lum-result__media'; m1.style.backgroundImage = ''; }
                    if (s1) s1.style.backgroundImage = '';
                    if (m2) { m2.className = 'lum-result__media'; m2.style.backgroundImage = ''; }
                    if (s2) s2.style.backgroundImage = '';

                    activeSlideIndex = 1; // Reset to Slide 1
                    
                    const slide1 = document.getElementById('lum-slide-1');
                    const slide2 = document.getElementById('lum-slide-2');
                    if (slide1) { slide1.style.opacity = '1'; slide1.style.zIndex = '2'; slide1.style.transform = ''; }
                    if (slide2) { slide2.style.opacity = '0'; slide2.style.zIndex = '1'; slide2.style.transform = ''; }

                    // Reset image history & clear chat
                    imageHistory.length = 0;
                    currentHistoryIndex = -1;
                    if (lumChatHistory) lumChatHistory.innerHTML = '';
                    if (lumChatScroll) lumChatScroll.scrollTop = 0;

                    if (shell) shell.classList.remove('is-loaded');
                    if (toolbar) { toolbar.style.transition = ''; toolbar.style.opacity = ''; toolbar.style.transform = ''; }
                    if (content) { content.style.transition = ''; content.style.transform = ''; content.style.opacity = ''; content.style.filter = ''; }
                }, 680);
            });
        }

        const btnMenu = document.getElementById('btn-menu');
        if (btnMenu && lumResultBack) {
            btnMenu.addEventListener('click', () => {
                if (lumResult.classList.contains('is-revealed') || lumResult.classList.contains('image-ready') || lumResult.classList.contains('in-chat-mode')) {
                    // Let the menu act as a 'back' gesture to the grid while in immersive mode
                    lumResultBack.click();
                }
            });
        }

    </script>

        // Inject keyboard into every .app-shell
        const shells = document.querySelectorAll('.app-shell');
        shells.forEach(shell => {
            if (!shell) return;
            const existingKb = Array.from(shell.children).find(ch => ch.hasAttribute('data-sim-kb'));
            if (existingKb) return;
            shell.insertAdjacentHTML('beforeend', KEYBOARD_HTML);
        });

        let activeTextarea = null;
        let isShifted = false;
        let nextCharUpper = false;

        const SHELL_SELECTOR = '.app-shell';

        function showKeyboard(inputEl) {
            const shell = inputEl.closest(SHELL_SELECTOR);
            if (!shell) return;
            const kb = shell.querySelector(':scope > [data-sim-kb]');
            if (!kb) return;

            activeTextarea = inputEl;
            shell.classList.remove('keyboard-closing');
            shell.classList.add('keyboard-open');
            kb.classList.add('visible');

            // Double-RAF: first frame makes kb visible, second frame layout is settled
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const kbHeight = kb.offsetHeight;
                    shell.style.setProperty('--kb-height', kbHeight + 'px');
                });
            });
        }

        function hideKeyboard(shell) {

                if (s.classList.contains('app-shell--video') && s.classList.contains('keyboard-open')) {
                    s.classList.remove('keyboard-open');

                    const ta = s.querySelector('.video-floating-input__textarea');
                    if (ta) ta.blur();
                    setTimeout(() => {
                        s.classList.remove('keyboard-closing');
                        const kb = s.querySelector(':scope > [data-sim-kb]');
                        if (kb) kb.classList.remove('visible');
                    }, 600);
                } else {
                    s.classList.remove('keyboard-open');
                    const kb = s.querySelector(':scope > [data-sim-kb]');
                    if (kb) kb.classList.remove('visible');
                }
            }

            if (!shell) {
                document.querySelectorAll('.keyboard-open').forEach(resetShell);
            } else {
                resetShell(shell);
            }
            activeTextarea = null;
            isShifted = false;
        }

        window.dismissKeyboard = function () { hideKeyboard(); };

        function typeChar(char) {
            if (!activeTextarea) return;
            const ta = activeTextarea;
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const val = ta.value;
            const actualChar = (isShifted || nextCharUpper) ? char.toUpperCase() : char;
            ta.value = val.substring(0, start) + actualChar + val.substring(end);
            ta.selectionStart = ta.selectionEnd = start + 1;
            nextCharUpper = /[.!?]\s$/.test(ta.value);
            if (isShifted) { isShifted = false; updateShiftVisual(); }
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function doBackspace() {
            if (!activeTextarea) return;
            const ta = activeTextarea;
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            if (start === end && start > 0) {
                ta.value = ta.value.substring(0, start - 1) + ta.value.substring(end);
                ta.selectionStart = ta.selectionEnd = start - 1;
            } else if (start !== end) {
                ta.value = ta.value.substring(0, start) + ta.value.substring(end);
                ta.selectionStart = ta.selectionEnd = start;
            }
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function updateShiftVisual() {
            document.querySelectorAll('[data-action="shift"]').forEach(btn => {
                btn.style.background = isShifted ? '#fff' : '';
                btn.style.color = isShifted ? '#0b57d0' : '';
            });
        }

        // Key taps — capture phase so pointerdown doesn't blur textarea
        document.addEventListener('pointerdown', e => {
            const key = e.target.closest('.sim-key');
            const suggest = e.target.closest('.sim-suggest');

            if (key) {
                e.preventDefault();
                e.stopPropagation();
                const char = key.dataset.char;
                const action = key.dataset.action;
                if (char) {
                    key.classList.add('popped');
                    setTimeout(() => key.classList.remove('popped'), 120);
                    typeChar(char);
                } else if (action === 'space') {
                    typeChar(' ');
                } else if (action === 'backspace') {
                    doBackspace();
                } else if (action === 'shift') {
                    isShifted = !isShifted;
                    updateShiftVisual();
                } else if (action === 'return') {
                    if (activeTextarea) {
                        const shell = activeTextarea.closest(SHELL_SELECTOR);
                        hideKeyboard(shell);
                        // Try to submit via the send button
                        const sendBtn = shell
                            ? shell.querySelector('#lum-float-send')
                            : null;
                        if (sendBtn) setTimeout(() => sendBtn.click(), 100);
                        else if (activeTextarea) activeTextarea.blur();
                    }
                }
            } else if (suggest) {
                e.preventDefault();
                e.stopPropagation();
                const word = suggest.dataset.word;
                if (word && activeTextarea) {
                    const ta = activeTextarea;
                    const val = ta.value;
                    const start = ta.selectionStart;
                    const prefix = val.length > 0 && !val.endsWith(' ') ? ' ' : '';
                    ta.value = val.substring(0, start) + prefix + word + ' ' + val.substring(start);
                    ta.selectionStart = ta.selectionEnd = start + prefix.length + word.length + 1;
                    ta.dispatchEvent(new Event('input', { bubbles: true }));
                }
            }
        }, true);

        // Show keyboard on textarea focus
        document.addEventListener('focusin', e => {
            if (e.target.matches('.video-floating-input__textarea')) {
                showKeyboard(e.target);
            }
        });

        // Click on floating input content to focus textarea
        document.addEventListener('click', e => {
            const floatingContent = e.target.closest('.video-floating-input__content');
            if (floatingContent && !e.target.closest('.video-floating-input__textarea')) {
                const ta = floatingContent.querySelector('.video-floating-input__textarea');
                if (ta) ta.focus();
            }
        });

        // Direct tap on the floating input pill — open keyboard immediately
        // This handles the case where the invisible textarea doesn't receive the tap
        document.addEventListener('pointerdown', e => {
            const floatingInput = e.target.closest('.video-floating-input');
            if (!floatingInput) return;
            // Don't intercept keyboard keys, send/action buttons
            if (e.target.closest('[data-sim-kb]')) return;
            if (e.target.closest('.video-floating-input__send-btn')) return;

            const shell = floatingInput.closest(SHELL_SELECTOR);
            if (!shell || shell.classList.contains('keyboard-open')) return;

            const ta = floatingInput.querySelector('.video-floating-input__textarea');
            if (ta) {
                e.preventDefault(); // prevent blur from stealing focus
                showKeyboard(ta);
                // Also focus so keyboard events work
                setTimeout(() => ta.focus(), 50);
            }
        }, true);

        // Hide keyboard when tapping outside
        document.addEventListener('pointerdown', e => {
            if (!activeTextarea) return;
            const inKeyboard = e.target.closest('[data-sim-kb]');
            const inInputBar = e.target.closest('.video-floating-input');
            if (!inKeyboard && !inInputBar) {
                const shell = activeTextarea.closest(SHELL_SELECTOR);
                hideKeyboard(shell);
            }
        });

        // Dismiss on send
        document.addEventListener('click', e => {
            const sendBtn = e.target.closest('.video-floating-input__send-btn');
            if (sendBtn && activeTextarea) hideKeyboard();
        });

    })();
    </script>

    <!-- ═══ Tab Switching Logic ═══ -->
    <script>
    (function() {
        const tabs = document.querySelectorAll('.prototype-nav__tab');
        const shell1 = document.getElementById('phone-shell-option1');
        const shell2 = document.getElementById('phone-shell-option2');
        const shell3 = document.getElementById('phone-shell-option3');
        const shellLoading = document.getElementById('phone-shell-loading');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Update active tab
                tabs.forEach(t => t.classList.remove('prototype-nav__tab--active'));
                tab.classList.add('prototype-nav__tab--active');

                const tabId = tab.getAttribute('data-tab');
                if (tabId === 'option1') {
                    shell1.style.display = '';
                    shell2.style.display = 'none';
                    if(shell3) shell3.style.display = 'none';
                    if(shellLoading) shellLoading.style.display = 'none';
                } else if (tabId === 'option2') {
                    shell1.style.display = 'none';
                    shell2.style.display = '';
                    if(shell3) shell3.style.display = 'none';
                    if(shellLoading) shellLoading.style.display = 'none';
                } else if (tabId === 'option3') {
                    shell1.style.display = 'none';
                    shell2.style.display = 'none';
                    if(shell3) shell3.style.display = '';
                    if(shellLoading) shellLoading.style.display = 'none';
                } else if (tabId === 'loading') {
                    shell1.style.display = 'none';
                    shell2.style.display = 'none';
                    if(shell3) shell3.style.display = 'none';
                    if(shellLoading) shellLoading.style.display = '';
                }
            });
        });
    })();
    </script>
    <!-- ══════════════════════════════════════════════════════════════════════
         SOVEREIGN MOTION ENGINE — Three.js powered blurry background texture drift
         Skill: SovereignMotionArchitect § "Heavy silk curtain sliding over glass"
         Technique: Parametric multi-octave Lissajous path + exponential lag smoothing
         NOT spring physics (springs oscillate). NOT CSS animation.
         Three.js Clock drives frame timing; CSS translate (L2) drives motion.
         ══════════════════════════════════════════════════════════════════════ -->
    <script>
    (function () {
        'use strict';

        function init() {
            if (typeof THREE === 'undefined') return;

            /* ── Three.js Clock for frame-rate-independent dt ─────────────────
               Per the skill: GPU-optimised, reflow-free (only transform / opacity).
               Only animate `translate` (CSS L2) — never width/height/margin.      */
            const clock = new THREE.Clock();

            /* ── MOTION DESIGN BRIEF (Sovereign Motion Architect) ─────────────
               "Background textures should breathe like deep water: felt
                subliminally, never consciously tracked. Motion is the connective
                tissue of cognition — present everywhere, visible nowhere."

               Technique chosen:  Parametric Lissajous path (multi-octave)
                                  + Exponential lag smoothing (τ ≈ 2 s)
               Why NOT spring:    Springs need precise overdamping. Even the
                                  'correct' discrete-time spring oscillates at
                                  low stiffness + 60 fps dt. Parametric paths
                                  are analytically smooth — zero ringing.        */

            /* ── LAYER 1: Translate drift — element frame position ────────────
               Period X ≈ 483 s (8 min)   Period Y ≈ 299 s (5 min)
               Golden-ratio harmonic (φ = 1.618) → irrational beat → never repeats. */
            const P1X = 0.013,          P1Y = 0.021;
            const P2X = P1X * 1.6180,   P2Y = P1Y * 1.6180;

            /* Translate amplitudes — within CSS scale(1.14) bleed zone.
               At 390px: bleed = 390 × 0.07 = 27px per side.                     */
            const A1X = 12,  A2X = 5;   /* H:  ±17 px max                        */
            const A1Y = 15,  A2Y = 6;   /* V:  ±21 px max                        */

            /* ── LAYER 2: Background-position drift — within-frame parallax ────
               Shifts WHICH part of the blurry image shows through the frame.
               Different frequencies from Layer 1 → 2 independent drift axes.
               Effect: "parallax within parallax" — the frame moves slowly,
               the image inside the frame also moves in a different direction.
               This is the difference between a texture and a static backdrop.    */
            const BP1X = 0.0071,        BP1Y = 0.0093; /* ~885s / ~676s periods  */
            const BP2X = BP1X * 1.618,  BP2Y = BP1Y * 1.618;
            const BA1X = 5,   BA2X = 2; /* bg-position offset in %: ±7% max      */
            const BA1Y = 5,   BA2Y = 2; /* (small — image is blurred so px-exact  */
                                        /*  detail doesn't matter, just lensing)  */

            /* ── Lag — exponential smoothing time constant τ = 1 / LAG_K ───────
               LAG_K = 0.55  →  τ ≈ 1.8 s.
               Position always trails the analytic target by ~1.8 s.              */
            const LAG_K = 0.55;

            /* ── Per-element state ─────────────────────────────────────────── */
            const states = new Map();      /* el → { x, y, bx, by, seed } */

            function ensureState(el) {
                if (!states.has(el)) {
                    const seed = Math.random() * Math.PI * 2;
                    const t    = clock.elapsedTime;
                    /* FIX: Initialise translate state to the CURRENT analytic target,
                       not (0, 0). Prevents the slow crawl from centre that occurs
                       when a new slide appears mid-session (t > 0).               */
                    const initX = Math.sin(t * P1X + seed)            * A1X
                                + Math.sin(t * P2X + seed * 1.3107)   * A2X;
                    const initY = Math.cos(t * P1Y + seed * 0.7854)   * A1Y
                                + Math.cos(t * P2Y + seed * 1.7321)   * A2Y;
                    const initBX = Math.sin(t * BP1X + seed * 0.43)   * BA1X
                                 + Math.sin(t * BP2X + seed * 0.91)   * BA2X;
                    const initBY = Math.cos(t * BP1Y + seed * 0.67)   * BA1Y
                                 + Math.cos(t * BP2Y + seed * 1.19)   * BA2Y;
                    states.set(el, {
                        x: initX, y: initY, bx: initBX, by: initBY, seed
                    });
                }
                return states.get(el);
            }

            /* ── Core drift function (runs every rAF frame) ─────────────────── */
            function driftEl(el, t, dt) {
                if (!el.isConnected) { states.delete(el); return; }

                /* Skip elements with no loaded image yet */
                const bg = el.style.backgroundImage;
                if (!bg || bg === '' || bg === 'none') return;

                const s  = ensureState(el);
                const ph = s.seed;

                /* ── Layer 1: translate drift ──────────────────────────────────
                   Analytic Lissajous target — fundamental + φ-harmonic.          */
                const tx = Math.sin(t * P1X + ph)            * A1X
                         + Math.sin(t * P2X + ph * 1.3107)   * A2X;
                const ty = Math.cos(t * P1Y + ph * 0.7854)   * A1Y
                         + Math.cos(t * P2Y + ph * 1.7321)   * A2Y;

                /* ── Layer 2: background-position drift ────────────────────────
                   Different frequency set from Layer 1 → independent motion axis. */
                const tbx = Math.sin(t * BP1X + ph * 0.43)   * BA1X
                          + Math.sin(t * BP2X + ph * 0.91)   * BA2X;
                const tby = Math.cos(t * BP1Y + ph * 0.67)   * BA1Y
                          + Math.cos(t * BP2Y + ph * 1.19)   * BA2Y;

                /* Exponential lag: f = 1 − e^(−k·dt)  — frame-rate independent.
                   Position always trails the analytic target, never overshoots.   */
                const f = 1 - Math.exp(-LAG_K * dt);
                s.x  += (tx  - s.x)  * f;
                s.y  += (ty  - s.y)  * f;
                s.bx += (tbx - s.bx) * f;
                s.by += (tby - s.by) * f;

                /* CSS `translate` (L2) — stacks on `transform: scale(1.14)` (L1).
                   No conflict with Option 2 scroll parallax. GPU composited.      */
                el.style.translate         = s.x.toFixed(2) + 'px ' + s.y.toFixed(2) + 'px';
                /* background-position shift — "lenses" into the blurry image.
                   50% is centre; ±7% max offset stays well within cover bounds.   */
                el.style.backgroundPosition = (50 + s.bx).toFixed(2) + '% ' + (50 + s.by).toFixed(2) + '%';
            }

            /* ── Public API: register any element from option2.js etc. ────────
               option2.js already uses `.lum-result__media` (line 190),
               so auto-collection handles it. Register additional els here.       */
            window.lumRegisterBgDrift = function (el) { ensureState(el); };

            /* ── Render loop — Three.js Clock provides dt ──────────────────── */
            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.05); /* cap at 50 ms    */
                const t  = clock.elapsedTime;

                /* Auto-collect every `.lum-result__media` in the DOM.
                   Handles: Option 1 slides, Option 2 swiper slides (same class),
                   and any future slide history entries created dynamically.       */
                document.querySelectorAll('.lum-result__media').forEach(el => {
                    driftEl(el, t, dt);
                });

                /* Also tick any externally registered elements */
                states.forEach(function (_, el) {
                    if (el.classList && el.classList.contains('lum-result__media')) return;
                    driftEl(el, t, dt);
                });
            }
            animate();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
