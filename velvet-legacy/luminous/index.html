            top: 68px;
            left: 20px;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(0,0,0,0.8);
            opacity: 0;
            transform: translateY(6px) scale(0.84);
            transition:
                opacity  400ms cubic-bezier(0.2, 0, 0, 1) 200ms,
                transform 400ms cubic-bezier(0.2, 0, 0, 1) 200ms;
            pointer-events: none;
        }

        /* Back appears ONLY when image is fully loaded, not during generation */
        .lum-result.is-loaded .lum-result__back {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .lum-result__back .material-symbols-outlined {
            font-size: 22px;
            font-weight: 300;
        }

        /* ── Loading Nav — Hidden per user request, preferring global toolbar ── */
        .lum-result__loading-nav {
            display: none !important;
            position: absolute;
            top: 62px;          /* Figma: appBar.y = 62 (below status bar)       */
            left: 16px;
            right: 16px;
            height: 64px;       /* Figma: appBar.height = 64                     */
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: opacity 400ms cubic-bezier(0.0, 0.0, 0.2, 1) 100ms; /* enter */
        }
        /* Show when panel is revealed + loading */
        .lum-result.is-revealed .lum-result__loading-nav {
            opacity: 1;
            pointer-events: auto;
        }
        /* Hide on exit — fast accelerate curve */
        .lum-result.is-loaded .lum-result__loading-nav {
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms cubic-bezier(0.4, 0.0, 1, 1);
        }

        /* Leading: glass pill — 44×44, radius 296 (pill), matches Figma leading button) */
        .lum-result__nav-menu {
            width: 44px;
            height: 44px;
            border-radius: 296px;
            border: none;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(43, 45, 44, 0.9);   /* Figma icon color ≈ #444B47        */
            transition: transform 120ms cubic-bezier(0.4, 0, 1, 1), background 150ms ease;
        }
        .lum-result__nav-menu .material-symbols-outlined {
            font-size: 24px;
            font-weight: 400;
        }
        .lum-result__nav-menu:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.8);
        }

        /* Trailing: glass pill — 92×44, radius 296, holds edit_square + more_horiz */
        .lum-result__nav-trailing {
            height: 44px;
            border-radius: 296px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            display: flex;
            align-items: center;
            padding: 0 4px;
            gap: 4px;
        }
        .lum-result__nav-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(43, 45, 44, 0.9);
            transition: background 150ms ease, transform 120ms cubic-bezier(0.4, 0, 1, 1);
        }
        .lum-result__nav-icon .material-symbols-outlined {
            font-size: 24px;
            font-weight: 300;   /* Light weight, matching Figma fontStyle 'Light' */
        }
        .lum-result__nav-icon:hover  { background: rgba(0, 0, 0, 0.06); }
        .lum-result__nav-icon:active { transform: scale(0.88); }

        /* Spinner ring while loading */
        /* ── Loader: redesigned as a top-positioned title heading ──────────────────
           The blur IS the loading indicator. No spinner needed.              */
        .lum-result__loader {
            position: absolute;
            top: 142px;          /* nav.top(62) + nav.height(64) + gap(16) = 142 */
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* left-aligned — the prompt is primary content */
            gap: 0;
            opacity: 1;
            transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1) 200ms;
            pointer-events: none;
            z-index: 10;
        }

        /* Spinner ring: hidden — the blurred background IS the loading state */
        .lum-result__ring-wrap {
            display: none;
        }
        .lum-result__ring-svg { display: none; }

        .lum-result__ring-track { stroke: rgba(0,0,0,0.12); }
        .lum-result__ring-fill  {
            stroke: rgba(0,0,0,0.7);
            stroke-linecap: round;
            stroke-dasharray: 120;
            animation: lumRingDash 1.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }

        /* Loading title — large left-aligned heading, matches result title position.
           md duration + enter easing (element arrives with weight).           */
        .lum-result__loader-label {
            display: block;
            font-family: 'Google Sans', sans-serif;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.3px;
            line-height: 1.3;
            /* Base case: generating from template page — warm light background, use dark text shimmer */
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            background-image: linear-gradient(
                110deg,
                rgba(0, 0, 0, 0.25) 0%,
                rgba(0, 0, 0, 0.25) 40%,
                rgba(0, 0, 0, 0.85) 50%,
                rgba(0, 0, 0, 0.25) 60%,
                rgba(0, 0, 0, 0.25) 100%
            );
            background-size: 250% 100%;
            animation: lum1-text-shimmer 2.4s cubic-bezier(0.2, 0.0, 0.2, 1) infinite;
        }

        /* In-chat mode: immersive environment, use bright white text shimmer */
        .lum-result.in-chat-mode .lum-result__loader-label {
            background-image: linear-gradient(
                110deg,
                rgba(255, 255, 255, 0.3) 0%,
                rgba(255, 255, 255, 0.3) 40%,
                rgba(255, 255, 255, 1) 50%,
                rgba(255, 255, 255, 0.3) 60%,
                rgba(255, 255, 255, 0.3) 100%
            );
        }

        @keyframes lum1-text-shimmer {
            0%   { background-position: 100% center; }
            100% { background-position: -50% center; }
        }

        /* ── Prompt label — glass bubble (Option 1) ────────────── */
        .lum1-prompt-label {
            position: absolute;
            top: 140px;            /* Sits below the permanent global toolbar */
            left: 20px;
            right: 20px;           /* Constrain bounds */
            display: flex;
            justify-content: flex-end; /* Right align the bubble */
            align-items: flex-start;
            z-index: 31;
            pointer-events: none;
            opacity: 0;
            transform: translateY(12px);
            will-change: opacity, transform;
            transition: opacity 640ms cubic-bezier(0.19, 1, 0.22, 1) 150ms,
                        transform 640ms cubic-bezier(0.19, 1, 0.22, 1) 150ms;
        }
        .lum-result.is-loaded .lum1-prompt-label {
            opacity: 1;
            transform: translateY(0);
        }
        .lum-result.in-chat-mode .lum1-prompt-label {
            /* Hide the glass bubble prompt label INSTANTLY when entering chat mode */
            opacity: 0 !important;
            visibility: hidden !important;
            transition: opacity 200ms ease, transform 200ms ease, visibility 0s 200ms;
            transform: translateY(-8px) !important;
        }
        .lum1-prompt-label__text {
            /* Glass Bubble Material */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 8px 16px;
            
            /* Typography */
            font-family: 'Google Sans', sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 0.01em;
            color: #fff;
            text-align: right;
            
            /* Clamping & Layout */
            max-width: 85%;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-word;
            max-height: 94px; /* 1.4 * 14 * 4 + 16 = 94.4 */
            
            /* Subtle polish */
            text-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        /* Legacy ring animations safely removed or disabled below */

        /* Hide spinner once image has loaded */
        .lum-result.is-loaded .lum-result__loader { 
            opacity: 0; 
            pointer-events: none; 
            /* Quick fade out before immersive image appears */
            transition: opacity 250ms cubic-bezier(0.4, 0.0, 1, 1) 0ms;
        }

        /* Status bar text fades to white as the dark immersive takes over */
        .generating .sys-time { color: #fff; mix-blend-mode: normal; transition: color 400ms ease; }
        .generating .sys-icons svg path,
        .generating .sys-icons svg rect { fill: #fff; transition: fill 400ms ease; }

        /* ═══════════════════════════════════════════════════════════════
           CHAT VIEW — Scrollable history above the immersive view
           User scrolls up from immersive → sees prompt+image chat log
           User scrolls back to bottom → lands back at immersive
           ═══════════════════════════════════════════════════════════════ */

        /* The outer scroll container that wraps BOTH chat history + immersive */
        .lum-chat-scroll {
            position: absolute;
            inset: 0;
            z-index: 6; /* above env/orbs/grain/slides, below floating input */
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            pointer-events: auto;
        }
        .lum-chat-scroll::-webkit-scrollbar { display: none; }

        /* ═══════════════════════════════════════════════════════════════
           CHAT VIEW — Figma-exact implementation
           ═══════════════════════════════════════════════════════════════ */

        /* Chat history container */
        .lum-chat-history {
            background: rgba(253, 251, 251, 1);
            min-height: calc(100% + 1px);
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            pointer-events: auto;
        }

        /* ── Chat Toolbar (Figma Toolbar layer, y=62) ── */
        .lum-chat-toolbar {
            width: 100%;
            height: 64px;           /* Figma: appBar.height = 64                     */
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 10;
            /* Transparent — glass pills have their own backdrop-filter            */
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        /* Glass button base (matches Figma glass pill BG) */
        .lum-ctb-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 44px;
            border: none;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 999px;
            cursor: pointer;
            color: #000;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.06);
            transition: transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1), background-color 120ms cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }
        .lum-ctb-btn:hover {
            background: rgba(255,255,255,0.7);
            transform: scale(1.02);
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.08);
        }
        .lum-ctb-btn:active {
            background: rgba(255,255,255,0.85);
            transform: scale(0.96);
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
        }

        /* Hamburger menu button (44×44) */
        .lum-ctb-btn--menu {
            width: 44px;
            padding: 0;
        }

        /* Model picker pill (72×44) */
        .lum-ctb-btn--model {
            padding: 0 4px 0 8px;
            gap: 4px;
            font-family: 'Google Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #000;
        }
        .lum-ctb-model-chevron {
            font-size: 18px;
            opacity: 0.54;
        }

        /* Compose + More pill (88×44, two icons) */
        .lum-ctb-btn--compose {
            width: 88px;
            padding: 0 2px;
            gap: 0;
            justify-content: space-around;
        }
        .lum-ctb-btn--compose svg {
            pointer-events: none;
        }

        /* ── Prompt bubble (Figma: x=138, y=159, w=245, h=88) ── */
        /* Right-aligned, light blue fill rgb(220,241,255) = rgba(0.863, 0.945, 1) */
        .lum-chat-turn {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 0 16px 0;
            gap: 0;
            /* Remove old animation—new one below */
            opacity: 0;
            transform: translateY(16px);
            animation: chatTurnIn 420ms cubic-bezier(0.2, 0, 0, 1) forwards;
        }

        @keyframes chatTurnIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Prompt bubble */
        .lum-chat-bubble {
            background: rgb(220, 241, 255); /* Figma: #DCF1FF */
            color: rgba(0,0,0,0.87);
            font-family: 'Google Sans', sans-serif;
            font-size: 17px;
            font-weight: 400;
            line-height: 24px;
            letter-spacing: 0;
            padding: 20px 24px;
            border-radius: 40px;
            max-width: 245px;
            word-wrap: break-word;
            margin-top: 0px;
            margin-bottom: 8px;
            transition: transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-origin: bottom right;
        }
        .lum-chat-bubble:hover { transform: scale(1.02); }

        .lum-chat-image-wrap {
            width: 100%;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1 / 1; /* fallback — JS overrides per-image */
            background: rgba(246, 244, 244, 1); /* Figma image placeholder fill */
            margin-bottom: 0;
            cursor: pointer;
            transition: transform 160ms cubic-bezier(0.4, 0.0, 0.2, 1),
                        aspect-ratio 400ms cubic-bezier(0.19, 1, 0.22, 1);
            will-change: transform;
            box-shadow: inset 0 0 48px 24px white; /* Deeper feathered edges inward */
        }
        .lum-chat-image-wrap:hover {
            transform: scale(0.98);
        }

        .lum-chat-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 300ms cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .lum-chat-image-wrap:hover img {
            transform: scale(1.04);
        }

        /* Action bar (Figma: Action Bar Mobile, right-aligned, h=34) */
        .lum-chat-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 24px;
            width: 100%;
            padding: 12px 0 0;
            box-sizing: border-box;
            margin-bottom: 16px;
        }

        /* Icon buttons in action bar */
        .lum-chat-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            margin: -8px; /* expand touch target by 16px */
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0,0,0,0.87);
            opacity: 0.87;
            transition: opacity 120ms, transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .lum-chat-action-btn:hover { background: rgba(0,0,0,0.06); transform: scale(1.1); }
        .lum-chat-action-btn:active { transform: scale(0.92); background: rgba(0,0,0,0.12); }

        /* Thumbs up/down: hand-drawn SVG path style from Figma */
        .lum-chat-action-btn svg {
            display: block;
        }



        /* When in chat mode, back button is always visible */
        .lum-result.in-chat-mode .lum-result__back {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* ═══════════════════════════════════════════════════════════════
           SOVEREIGN MOTION — Immersive → Chat Transition
           Physics: Fluid/Cinematic spring — Stiffness: 120, Damping: 14
           ═══════════════════════════════════════════════════════════════ */

        /* — The Immersive Slot: the scroll-driven transition target —
           As the user scrolls up, this surface transitions from a full-bleed
           dark immersive into a framed image card sitting in cream light. */
        .lum-immersive-slot {
            height: 100vh;
            min-height: 874px;
            width: 100%;
            flex-shrink: 0;
            position: relative;
            /* Bleeds the solid cream into the immersive transparent space over 160px natively */
            background: linear-gradient(to bottom, rgba(253, 251, 251, 1) 0%, rgba(253, 251, 251, 0) 160px);
            pointer-events: none;
            /* Performance: isolate this compositing layer */
            will-change: transform;
        }

        /* — The live slides container morphs as user scrolls from immersive to chat:
           It transitions from fixed/full-bleed to a bounded card shape.
           Driven by the JS scroll controller via inline CSS custom properties. */
        .lum-slides-container {
            /* Base: absolute fill of lum-result */
            transition:
                border-radius 980ms cubic-bezier(0.19, 1, 0.22, 1),
                box-shadow    980ms cubic-bezier(0.19, 1, 0.22, 1),
                transform     980ms cubic-bezier(0.19, 1, 0.22, 1),
                opacity       640ms cubic-bezier(0.4, 0, 0.2, 1);
        }


        /* ── Action Pill (Button Group) ── */
        .lum-action-pill {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(24px);
            width: 196px;
            height: 44px;
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(28px) saturate(1.8);
            -webkit-backdrop-filter: blur(28px) saturate(1.8);
            border: 0.5px solid rgba(255, 255, 255, 0.18);
            border-radius: 296px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            opacity: 0;
            pointer-events: none;
            z-index: 45;
            box-shadow: 0 4px 24px rgba(0,0,0,0.32), 0 1px 4px rgba(0,0,0,0.20);
            transition: 
                opacity 200ms ease, 
                transform 200ms ease;
        }
        .lum-result.image-ready .lum-action-pill {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
            transition: 
                opacity 1100ms cubic-bezier(0.19, 1.0, 0.22, 1.0) 300ms, 
                transform 1100ms cubic-bezier(0.19, 1.0, 0.22, 1.0) 300ms;
        }
        .lum-action-pill__btn {
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            border-radius: 18px;
            transition: background 120ms ease, transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }
        .lum-action-pill__btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.04);
        }
        .lum-action-pill__btn:active {
            transform: scale(0.92);
        }
        .lum-action-pill__btn .material-symbols-outlined {
            font-size: 24px;
        }

        /* — Chat-mode: when fully in chat, env is cream (JS-driven during scroll,
           CSS handles the final settled state only) — */
        .lum-result.in-chat-mode .lum-result__env {
            background: rgba(253, 251, 251, 1) !important;
        }

        /* Toolbar shows only when image is fully loaded and user is at rest */
        .lum-result.image-ready #lum-toolbar {
            opacity: 1;
            pointer-events: auto;
        }

        /* — Grain fades as light returns — */
        .lum-result.in-chat-mode .lum-result__grain {
            opacity: 0;
            transition: opacity 600ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* — Surface image fades when in chat (the bleed image goes away,
           making room for the framed card above) — */
        .lum-result.in-chat-mode .lum-result__media-surface {
            opacity: 0;
            transform: scale(0.95) translateY(-12px);
            transition:
                opacity   400ms cubic-bezier(0.4, 0, 0.2, 1),
                transform 600ms cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* — Status bar: dark text returns as environment lightens — */
        .lum-result.in-chat-mode .sys-time { color: #000; mix-blend-mode: multiply; transition: color 480ms ease; }
        .lum-result.in-chat-mode .sys-icons svg path,
        .lum-result.in-chat-mode .sys-icons svg rect { fill: #000; transition: fill 480ms ease; }

         /* — Chat toolbar materialises from the top within the result panel.
           Scoped to .lum-result so Option 2's chat toolbar stays visible by default.
           Prime Number Stagger: toolbar 0ms, content 31ms — */
        .lum-result .lum-chat-toolbar {
            opacity: 0;
            transform: translateY(-8px);
            transition:
                opacity   480ms cubic-bezier(0.2, 0, 0, 1) 31ms,
                transform 640ms cubic-bezier(0.19, 1, 0.22, 1) 31ms;
        }
        .lum-result.in-chat-mode .lum-chat-toolbar {
            opacity: 1;
            transform: translateY(0);
        }

        /* — Chat turn entrance: Prime Number Staggers via nth-child —
           Each turn staggers by 53ms relative to previous (elastic settle) */
        .lum-chat-turn:nth-child(1) { animation-delay:  31ms; }
        .lum-chat-turn:nth-child(2) { animation-delay:  84ms; }
        .lum-chat-turn:nth-child(3) { animation-delay: 137ms; }
        .lum-chat-turn:nth-child(4) { animation-delay: 190ms; }
        .lum-chat-turn:nth-child(5) { animation-delay: 243ms; }

        /* — Bubble: springs in from slight rightward drift — */
        @keyframes chatBubbleIn {
            from {
                opacity: 0;
                transform: translateX(14px) scale(0.94);
                filter: blur(3px);
            }
            60% { filter: blur(0); }
            to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        }
        .lum-chat-bubble {
            animation: chatBubbleIn 560ms cubic-bezier(0.19, 1, 0.22, 1) 53ms both;
        }

        /* — Image card: the photo folds in from full-bleed to contained card.
           Starts large+blurry (matching the immersive surface), snaps to crisp card — */
        @keyframes chatImageCardIn {
            from {
                opacity: 0;
                transform: scale(1.06) translateY(-16px);
                filter: blur(8px);
                border-radius: 0px;
            }
            50%  { filter: blur(0); }
            to   {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
                border-radius: 40px;
            }
        }
        .lum-chat-image-wrap {
            /* Override: animation drives border-radius, not CSS property directly */
            animation: chatImageCardIn 920ms cubic-bezier(0.19, 1, 0.22, 1) 89ms both;
        }

        /* — Action bar: rises from below, staggered after image — */
        @keyframes chatActionsIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .lum-chat-actions {
            animation: chatActionsIn 480ms cubic-bezier(0.2, 0, 0, 1) 200ms both;
        }

        /* — Floating input: transitions from dark-immersive pill to light-chat pill — */
        .lum-result.in-chat-mode .video-floating-input__bg {
            background: rgba(255, 255, 255, 0.8) !important;
            box-shadow:
                inset 0px -2px 12px 0px rgba(15,15,15,0.06),
                0 2px 12px rgba(0,0,0,0.06) !important;
            transition:
                background  640ms cubic-bezier(0.19, 1, 0.22, 1),
                box-shadow  640ms cubic-bezier(0.19, 1, 0.22, 1);
        }
        .lum-result.in-chat-mode .video-floating-input__placeholder,
        .lum-result.in-chat-mode .video-floating-input__textarea {
            color: rgba(0,0,0,0.55);
            transition: color 400ms ease;
        }
        .lum-result.in-chat-mode .video-floating-input__action-btn {
            color: rgba(0,0,0,0.6);
            transition: color 400ms ease;
        }

        /* — Back button: in chat mode it changes style to dark-on-light — */
        .lum-result.in-chat-mode .lum-result__back {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            background: rgba(0,0,0,0.06);
            color: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            transition:
                opacity     400ms cubic-bezier(0.2, 0, 0, 1),
                background  400ms cubic-bezier(0.2, 0, 0, 1),
                color       400ms cubic-bezier(0.2, 0, 0, 1);
        }
        /* Slow breathing/drift for the blurry background image */
        @keyframes lumBgDrift {
            0% { transform: scale(1.14) translate3d(0, 0, 0); }
            50% { transform: scale(1.20) translate3d(-15px, 15px, 0); }
            100% { transform: scale(1.14) translate3d(15px, -15px, 0); }
        }

        /* Secondary rich fog overlay for blurry background image */
        .lum-result__media.is-loaded::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: inherit;
            background-size: cover;
            background-position: center;
            border-radius: 0;
            filter: blur(80px) brightness(0.85);
            opacity: 0.5;
            z-index: -1; /* falls behind sharp foreground */
            animation: lumRichFog 45s infinite alternate ease-in-out;
        }

        @keyframes lumRichFog {
            0% { transform: scale(1.14) translate3d(0, 0, 0); opacity: 0.4; }
            50% { transform: scale(1.24) translate3d(-15px, 20px, 0); opacity: 0.7; }
            100% { transform: scale(1.14) translate3d(20px, -15px, 0); opacity: 0.3; }
        }
