<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luminous — Image Immersive</title>
    <meta name="description" content="Luminous — AI-powered immersive image generation and editing.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/google-sans" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <!-- Three.js r152 — WebGL Aurora + Particle Engine -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #060606;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Google Sans', 'Google Sans Text', sans-serif;
            overflow: hidden;
        }

        /* ── Phone Shell ── */
        .phone-shell {
            position: relative;
            width: 402px;
            height: 874px;
            border-radius: 62px;
            overflow: hidden;
            background: rgba(253, 252, 252, 1);
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.08),
                0 8px 24px rgba(0,0,0,0.12),
                0 32px 80px rgba(0,0,0,0.16);
        }

        /* ── Background with radial blue gradient (Figma-exact) ── */
        /* Source: gradient rect 330×570 at (36,220), cornerRadius 170, blur 120, opacity 1  */
        /* gradientTransform center → tx=0.372, ty=0.577 → 37.2% 57.7%                      */
        /* stops: rgba(253,252,252,1) @ 50%, rgba(157,210,255,1) @ 100%                      */
        .phone-bg {
            position: absolute;
            inset: 0;
            background: rgba(253, 252, 252, 1);
            z-index: 0;
        }

        .phone-bg::after {
            content: '';
            position: absolute;
            left: 36px;
            top: 220px;
            width: 330px;
            height: 570px;
            border-radius: 170px;
            background: radial-gradient(
                ellipse at 37% 58%,
                rgba(253, 252, 252, 1) 0%,
                rgba(253, 252, 252, 1) 50%,
                rgba(157, 210, 255, 1) 100%
            );
            filter: blur(80px);
            opacity: 1;
            animation: phone-bg-breathe 22s ease-in-out infinite alternate;
            will-change: transform, filter;
        }

        @keyframes phone-bg-breathe {
            0% {
                transform: scale(1) translate(0px, 0px) rotate(0deg);
                filter: blur(80px);
            }
            33% {
                transform: scale(1.06) translate(-4%, 2%) rotate(2deg);
                filter: blur(95px);
            }
            66% {
                transform: scale(0.96) translate(3%, -3%) rotate(-1deg);
                filter: blur(75px);
            }
            100% {
                transform: scale(1.02) translate(1%, 2%) rotate(1deg);
                filter: blur(85px);
            }
        }

        /* ── All content above bg ── */
        .phone-content {
            position: relative;   /* z-index stacking context */
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* ── Dynamic Island Status Bar — transparent overlay ── */
        .sys-ui {
            position: absolute;   /* overlays scroll content seamlessly */
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 62px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 21px 20px 0;
            z-index: 999;
            background: transparent;
            pointer-events: none;
            /* Lightweight GPU hint — avoids creating a new clipping context */
            will-change: transform;
        }

        .sys-ui.theme-white-text .sys-time { color: #fff; }
        .sys-ui.theme-white-text .sys-icons svg [fill="#000"] { fill: #fff !important; }
        .sys-ui.theme-white-text .sys-icons svg [stroke="#000"] { stroke: #fff !important; }

        /* Dynamic Island pill */
        .sys-ui::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 37px;
            background: #000;
            border-radius: 0 0 24px 24px;
        }

        .sys-time {
            font-size: 17px;
            font-weight: 600;
            color: #000;   /* stays dark — background is white/light */
            letter-spacing: -0.3px;
            line-height: 22px;
            font-feature-settings: "tnum";
            mix-blend-mode: multiply;   /* reads on any bg colour */
        }

        .sys-icons {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* ── Toolbar — absolute overlay (matches video-glass-toolbar) ── */
        /* Floats over the scroll container, positioned below the status bar (top:62px) */
        .toolbar {
            position: absolute;
            top: 62px;     /* right below sys-ui like video-glass-toolbar */
            left: 0;
            right: 0;
            z-index: 50; /* Superimposes over lum-result (z-index: 18) */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 64px;          /* Figma appBar.height = 64                      */
            background: transparent;
            opacity: 1;            /* Visible by default on template pages          */
            pointer-events: auto;
            /* Smooth glass blur in on scroll */
            transition:
                opacity 300ms cubic-bezier(0.19, 1.0, 0.22, 1.0),
                background 300ms cubic-bezier(0.4, 0, 0.2, 1),
                backdrop-filter 300ms ease,
                -webkit-backdrop-filter 300ms ease;
        }

        /* Toolbar scrim — same gradient mask as video-glass-toolbar__scrim */
        .toolbar__scrim {
            position: absolute;
            top: -62px;
            left: 0;
            right: 0;
            height: 62px;
            pointer-events: none;
            z-index: -1;
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }

        .toolbar__scrim::before {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
        }



        /* Liquid Glass button — matches video-glass-btn in studio */
        .glass-btn {
            height: 44px;
            width: 44px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 296px;
            padding: 0;
            position: relative;
            background: transparent;
            transition: transform 0.15s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            isolation: isolate;
        }

        /* Frosted glass blur layer */
        .glass-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 296px;
            background: rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            opacity: 0.67;
            z-index: 0;
        }

        /* White fill overlay */
        .glass-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 296px;
            background: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .glass-btn:hover::after { background: rgba(255, 255, 255, 0.65); }
        .glass-btn:active { transform: scale(0.94); }

        .glass-btn svg {
            width: 24px;
            height: 24px;
            position: relative;
            z-index: 2;
        }

        /* Compose variant: circular 44×44 (Figma DC Toolbar — same circle as menu) */
        .glass-btn--compose {
            width: 44px;
            gap: 0;
            padding: 0;
        }

        .glass-btn__compose-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }
        .glass-btn__compose-icon svg { width: 24px; height: 24px; }

        .glass-btn__more-dots {
            width: 32px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            font-family: 'SF Pro', -apple-system, system-ui, sans-serif;
            font-weight: 900;
            font-size: 18px;
            color: #000;
            letter-spacing: 1px;
            padding-bottom: 4px;
        }

        /* ── Main Nav: shared glass pill design (Figma DC Toolbar redesign) ─────────────
           Used on: Option 1 template, Option 1 chat, Option 2 template, Option 2 chat.
           NOT used on immersive views (those have back/close buttons).             */

        /* Floating circular nav button base */
        .lum-main-nav__menu {
            width: 44px;
            height: 44px;
            border-radius: 296px;
            border: none;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(43, 45, 44, 0.9);
            transition: transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1), background 120ms ease, box-shadow 120ms ease;
            will-change: transform;
        }
        .lum-main-nav__menu .material-symbols-outlined {
            font-size: 24px;
            font-weight: 400;
        }
        .lum-main-nav__menu:hover {
            transform: scale(1.04);
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.04), 0 6px 20px rgba(0,0,0,0.12);
        }
        .lum-main-nav__menu:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.06);
        }

        /* Trailing: 92×44 glass pill — holds two icon buttons */
        .lum-main-nav__trailing {
            height: 44px;
            border-radius: 296px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            display: flex;
            align-items: center;
            padding: 0 4px;
            gap: 4px;
        }

        /* Icon buttons inside the trailing pill */
        .lum-main-nav__icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(43, 45, 44, 0.9);
            transition: background 120ms ease, transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }
        .lum-main-nav__icon .material-symbols-outlined {
            font-size: 24px;
            font-weight: 300;   /* Light — matches Figma 'Light' weight for trailing icons */
        }
        .lum-main-nav__icon:hover  { background: rgba(0, 0, 0, 0.06); transform: scale(1.04); }
        .lum-main-nav__icon:active { transform: scale(0.92); background: rgba(0, 0, 0, 0.12); }

        /* ── Heading ── */
        /* Lives inside the scroll container — padded to sit below the absolute toolbar */
        /* Matches .app-shell--video .content__heading { padding-top: 100px } */
        .heading {
            padding: 125px 16px 8px;
        }

        .heading h1 {
            font-family: 'Google Sans', sans-serif;
            font-size: 36px;
            font-weight: 400;
            line-height: 44px;
            color: rgba(31, 31, 31, 1);
            letter-spacing: -0.5px;
        }

        /* ── Cards Grid (scrollable) — matches .content in styles.css ── */
        .cards-scroll {
            flex: 1;                        /* fill remaining height */
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;   /* iOS rubber-band momentum */
            overscroll-behavior-y: contain;
            position: relative;             /* needed for ::before pseudo fade edge + z-index */
            z-index: 10;                    /* paints above result panel (z-index 5) by default */
        }

        .cards-scroll::-webkit-scrollbar {
            display: none;
        }

        /* ── Top scroll-exit fade ────────────────────────────────────────
           A frosted glass veil sits at the very top of the scroll area.
           As cards scroll upward past this edge they blur and dissolve
           into the transparent sys-ui above — seamless, no hard cutoff.
           ─────────────────────────────────────────────────────────────── */
        .cards-scroll::before {
            content: '';
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 116px;   /* covers sys-ui (62px) + half the toolbar (54px) */
            display: block;
            flex-shrink: 0;
            z-index: 10;
            margin-bottom: -116px;  /* pulls following content back up — no space consumed */
            pointer-events: none;
            /* The blur layer — matches the background to dissolve cleanly */
            background: linear-gradient(
                to bottom,
                rgba(253, 252, 252, 1)   0%,
                rgba(253, 252, 252, 0.9) 30%,
                rgba(253, 252, 252, 0.6) 60%,
                rgba(253, 252, 252, 0)   100%
            );
            /* Gaussian blur intensifies toward the top, weakens at bottom */
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            /* Mask so only the top portion of the veil is solid */
            -webkit-mask-image: linear-gradient(
                to bottom,
                rgba(0,0,0,1) 0%,
                rgba(0,0,0,0.85) 35%,
                rgba(0,0,0,0.35) 65%,
                rgba(0,0,0,0) 100%
            );
            mask-image: linear-gradient(
                to bottom,
                rgba(0,0,0,1) 0%,
                rgba(0,0,0,0.85) 35%,
                rgba(0,0,0,0.35) 65%,
                rgba(0,0,0,0) 100%
            );
            transition: backdrop-filter 200ms ease, opacity 200ms ease;
        }

        /* When scrolled: the blur kicks in and strengthens */
        .cards-scroll.is-scrolled::before {
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }


        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding-bottom: 24px;
        }

        .cards-row {
            display: flex;
            gap: 8px;
            padding: 0 16px 8px;
        }

        /* Card entrance animation — same as .video-card in studio */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        .style-card {
            flex: 1;
            height: 136px;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: none;
            background: #ccc;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.2s ease;
            flex-shrink: 0;
            /* Entrance: initially invisible, animated in by JS IntersectionObserver */
            opacity: 0;
            will-change: transform, opacity;
        }

        /* Cards that have been revealed */
        .style-card.cards-visible {
            animation: cardIn 400ms cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        /* Stagger rows 1–6: row index is set via --row-index custom property */
        .cards-row:nth-child(1) .style-card { animation-delay: 0ms; }
        .cards-row:nth-child(2) .style-card:nth-child(1) { animation-delay: 60ms; }
        .cards-row:nth-child(2) .style-card:nth-child(2) { animation-delay: 90ms; }
        .cards-row:nth-child(3) .style-card:nth-child(1) { animation-delay: 120ms; }
        .cards-row:nth-child(3) .style-card:nth-child(2) { animation-delay: 150ms; }
        .cards-row:nth-child(4) .style-card:nth-child(1) { animation-delay: 180ms; }
        .cards-row:nth-child(4) .style-card:nth-child(2) { animation-delay: 210ms; }
        .cards-row:nth-child(5) .style-card:nth-child(1) { animation-delay: 240ms; }
        .cards-row:nth-child(5) .style-card:nth-child(2) { animation-delay: 270ms; }
        .cards-row:nth-child(6) .style-card:nth-child(1) { animation-delay: 300ms; }
        .cards-row:nth-child(6) .style-card:nth-child(2) { animation-delay: 330ms; }

        /* Hover zoom (mirrors .video-card:hover .video-card__img) */
        /* ── Per-card image scale — each template framed at its own zoom level ──
           object-fit:cover clips to the card, so scale adjusts how much of
           the photo shows through — creating natural size variety across the grid */
        .cards-row:nth-child(1) .style-card:nth-child(1) .style-card__img { transform: scale(1.08); }
        .cards-row:nth-child(1) .style-card:nth-child(2) .style-card__img { transform: scale(1.0);  }
        .cards-row:nth-child(2) .style-card:nth-child(1) .style-card__img { transform: scale(1.12); }
        .cards-row:nth-child(2) .style-card:nth-child(2) .style-card__img { transform: scale(1.05); }
        .cards-row:nth-child(3) .style-card:nth-child(1) .style-card__img { transform: scale(0.96); }
        .cards-row:nth-child(3) .style-card:nth-child(2) .style-card__img { transform: scale(1.10); }
        .cards-row:nth-child(4) .style-card:nth-child(1) .style-card__img { transform: scale(1.06); }
        .cards-row:nth-child(4) .style-card:nth-child(2) .style-card__img { transform: scale(1.14); }
        .cards-row:nth-child(5) .style-card:nth-child(1) .style-card__img { transform: scale(1.02); }
        .cards-row:nth-child(5) .style-card:nth-child(2) .style-card__img { transform: scale(1.09); }
        .cards-row:nth-child(n+6) .style-card:nth-child(1) .style-card__img { transform: scale(1.07); }
        .cards-row:nth-child(n+6) .style-card:nth-child(2) .style-card__img { transform: scale(1.03); }

        /* Hover: each image scales up slightly from its base */
        .style-card:hover .style-card__img {
            transform: scale(1.06);
        }

        /* First row cards get bigger radius per Figma (40px) */
        .cards-row:first-child .style-card {
            border-radius: 40px;
        }

        .style-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }

        .style-card:active {
            transform: scale(0.97);
        }

        .style-card__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* Subtle zoom transition matching studio's .video-card__img */
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
        }

        /* Gradient overlay from top (light) to bottom (dark) */
        .style-card__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0) 0%,
                rgba(0,0,0,0.24) 100%
            );
            pointer-events: none;
        }

        /* Label bar at bottom */
        .style-card__label-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(
                to bottom,
                rgba(71,71,71,0) 0%,
                rgba(71,71,71,0.44) 65%
            );
            display: flex;
            align-items: flex-end;
        }

        .style-card__label {
            font-family: 'Google Sans Text', 'Google Sans', sans-serif;
            font-weight: 700;
            font-size: 16px;
            line-height: 24px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }


        /* ══════════════════════════════════════════════════════
           FLOATING INPUT — LR26 input-container style
           Aurora glow + full-width expansion on keyboard open
           ══════════════════════════════════════════════════════ */

        /* Animated aurora color property (LR26 pattern) */
        @property --aurora-color {
            syntax: '<color>';
            inherits: true;
            initial-value: #9DD2FF;
        }

        /* Outer wrapper: absolute, bottom-anchored, full width */
        .video-floating-input {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: transform 500ms cubic-bezier(0.2, 0, 0, 1);
            will-change: transform;
            --aurora-color: #9DD2FF;
        }

        /* Scrim: soft fade above the input */
        .video-floating-input__scrim {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            transition: opacity 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Container: pill that expands on keyboard open — LR26 style */
        .video-floating-input__container {
            position: relative;
            z-index: 1;
            width: 314px;
            min-height: 80px;
            height: auto;
            border-radius: 80px;
            pointer-events: auto;
            margin-bottom: 20px;
            animation: videoInputFloat 600ms cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            animation-delay: 300ms;
            /* LR26: width, border-radius morph on open/close */
            transition:
                width 0.35s cubic-bezier(0.2, 0, 0, 1),
                min-height 0.35s cubic-bezier(0.2, 0, 0, 1),
                border-radius 0.35s cubic-bezier(0.2, 0, 0, 1),
                box-shadow 0.5s cubic-bezier(0.2, 0, 0, 1);
            will-change: width, border-radius;
        }

        /* LR26 bg: white pill with aurora inset glow */
        .video-floating-input__bg {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: #ffffff;
            box-shadow:
                inset 0px -4px 24px 0px rgba(15, 15, 15, 0.10),
                inset -12px -6px 32px 0px var(--aurora-color),
                0 2px 12px rgba(0, 0, 0, 0.06),
                0 1px 3px rgba(0, 0, 0, 0.04);
            z-index: 0;
            transition:
                border-radius 0.35s cubic-bezier(0.2, 0, 0, 1),
                box-shadow 0.5s cubic-bezier(0.2, 0, 0, 1);
            /* LR26: feather the bottom edge */
            -webkit-mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
        }

        /* Crisp glass overlay */
        .video-floating-input__container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;   /* follows the pill border-radius */
            background: rgba(255,255,255,0.90);
            z-index: 0;
            pointer-events: none;
            transition: border-radius 0.35s cubic-bezier(0.2, 0, 0, 1);
        }

        /* Content column inside the pill */
        .video-floating-input__content {
            position: relative;
            z-index: 1;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
            min-height: 80px;
            box-sizing: border-box;
            background-color: transparent;
            border-radius: inherit;
            transition:
                background-color 400ms cubic-bezier(0, 0, 0.2, 1),
                padding 450ms cubic-bezier(0.2, 0, 0, 1) 100ms;
        }

        /* Input row: horizontal layout */
        .video-floating-input__input-row {
            display: flex;
            align-items: center;
            gap: 0;
            min-height: 56px;
            height: auto;
            flex-shrink: 0;
        }

        /* Attachment row (hidden by default) */
        .video-floating-input__attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            padding: 0;
            transition:
                max-height 180ms cubic-bezier(0.4, 0, 0.2, 1),
                opacity 150ms cubic-bezier(0.4, 0, 0.2, 1),
                padding 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Text field */
        .video-floating-input__field {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            position: relative;
            cursor: text;
            min-height: 44px;
            height: auto;
        }

        /* Placeholder text */
        .video-floating-input__placeholder {
            position: absolute;
            left: 0;
            top: 10px;
            pointer-events: none;
            font-family: 'Google Sans', var(--font-sans, sans-serif);
            font-size: 20px;
            font-weight: 300;
            line-height: 24px;
            letter-spacing: -0.2px;
            color: rgba(0, 0, 0, 0.54);
            white-space: nowrap;
            transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Action buttons (add, mic, record) */
        .video-floating-input__action-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 22px;
            transition: background 200ms ease;
        }

        .video-floating-input__morph-shape {
            width: 20px;
            height: 20px;
            border: 2px solid #000;
            border-radius: 50%;
            transition: 
                border-radius 350ms cubic-bezier(0.19, 1.0, 0.22, 1.0),
                transform 350ms cubic-bezier(0.19, 1.0, 0.22, 1.0);
        }

        .app-shell--video.submitting #lum-float-mic,
        .app-shell--video.generating #lum-float-mic {
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms cubic-bezier(0.19, 1.0, 0.22, 1.0);
        }

        .video-floating-input__action-btn {
            transition: background 120ms ease, transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }
        .video-floating-input__action-btn:hover { background: rgba(0,0,0,0.06); transform: scale(1.04); }
        .video-floating-input__action-btn:active { transform: scale(0.92); }

        .video-floating-input__action-btn .material-symbols-outlined {
            font-size: 28px;
            font-weight: 200;
            font-variation-settings: 'FILL' 0, 'GRAD' 0, 'ROND' 100;
        }

        /* Morph container: record ↔ send share the same 44×44 space */
        .video-floating-input__morph-container {
            position: relative;
            width: 44px;
            height: 44px;
            flex: none;
        }

        .video-floating-input__morph-container .video-floating-input__action-btn,
        .video-floating-input__morph-container .video-floating-input__send-btn {
            position: absolute;
            inset: 0;
        }

        /* Send button */
        .video-floating-input__send-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none; background: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
            transition: background 120ms ease, transform 120ms cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }
        .video-floating-input__send-btn:hover { background: rgba(0,0,0,0.06); transform: scale(1.04); }
        .video-floating-input__send-btn:active { transform: scale(0.92); }

        .video-floating-input__send-circle {
            position: absolute;
            width: 40px; height: 40px;
            left: 2px; top: 2px;
            border-radius: 50%;
            background: #DCF1FF;
        }

        .video-floating-input__send-icon {
            position: absolute;
            inset: 0;
            font-weight: 205;
            font-size: 32px;
            line-height: 44px;
            display: flex; align-items: center; justify-content: center;
            color: #2051DA;
            font-variation-settings: 'FILL' 1, 'GRAD' 0, 'ROND' 100;
        }

        .video-floating-input__send-btn:active { transform: scale(0.9); }

        /* Textarea overlay */
        .video-floating-input__textarea {
            width: 100%;
            height: 24px;
            opacity: 0;
            font-family: 'Google Sans', sans-serif;
            font-size: 20px;
            font-weight: 400;
            line-height: 24px;
            letter-spacing: -0.2px;
            color: #1f1f1f;
            background: transparent;
            border: none; outline: none;
            resize: none;
            padding: 0; margin: 0;
            cursor: text;
            z-index: 2;
            overflow: hidden;
        }

        .video-floating-input__textarea:focus,
        .video-floating-input__textarea:not(:placeholder-shown) { opacity: 1; }

        .video-floating-input__textarea:not(:placeholder-shown) + .video-floating-input__placeholder { opacity: 0; }

        /* ── Record: default visible ── */
        .video-floating-input__morph-container #lum-float-record {
            opacity: 1;
            transform: rotate(0deg) scale(1);
            transition:
                opacity 150ms cubic-bezier(0, 0, 0.2, 1),
                transform 200ms cubic-bezier(0, 0, 0.2, 1);
        }
        .video-floating-input__morph-container #lum-float-record {
            transition-delay: 120ms;
        }

        /* ── Send: hidden behind record ── */
        .video-floating-input__morph-container .video-floating-input__send-btn {
            opacity: 1;
            pointer-events: none;
        }
        .video-floating-input__morph-container .video-floating-input__send-circle {
            transform: scale(0);
            transition: transform 250ms cubic-bezier(0, 0, 0.2, 1) 60ms;
        }
        .video-floating-input__morph-container .video-floating-input__send-icon {
            opacity: 0;
            transform: translateY(6px);
            transition:
                opacity 200ms cubic-bezier(0, 0, 0.2, 1) 120ms,
                transform 200ms cubic-bezier(0, 0, 0.2, 1) 120ms;
        }

        /* ── HAS TEXT: morph record → send ── */
        .video-floating-input__input-row.has-text .video-floating-input__morph-container #lum-float-record {
            opacity: 0;
            transform: rotate(20deg) scale(0.6);
            pointer-events: none;
        }
        .video-floating-input__input-row.has-text .video-floating-input__morph-container .video-floating-input__send-btn {
            pointer-events: auto;
        }
        .video-floating-input__input-row.has-text .video-floating-input__morph-container .video-floating-input__send-circle {
            transform: scale(1);
        }
        .video-floating-input__input-row.has-text .video-floating-input__morph-container .video-floating-input__send-icon {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Keyframes (shared with studio) ── */
        @keyframes videoInputFloat {
            0%   { opacity: 0; transform: translateY(24px) scale(0.9); filter: blur(8px); }
            30%  { opacity: 0.6; filter: blur(2px); }
            55%  { opacity: 1; transform: translateY(-4px) scale(1.02); filter: blur(0); }
            75%  { transform: translateY(1px) scale(0.995); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes neuralPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50%       { opacity: 1; transform: scale(1.04); }
        }

        /* ── LR26 animated aurora background (keyboard state) ──────── */
        @keyframes lumBlob1 {
            0%         { transform: translate(0, 0) scale(1); }
            20%        { transform: translate(18px, -28px) scale(1.08); }
            50%        { transform: translate(-12px, 22px) scale(0.93); }
            75%        { transform: translate(22px, 8px) scale(1.05); }
            100%       { transform: translate(0, 0) scale(1); }
        }
        @keyframes lumBlob2 {
            0%         { transform: translate(0, 0) scale(1); }
            25%        { transform: translate(-20px, 18px) scale(1.12); }
            55%        { transform: translate(16px, -22px) scale(0.9); }
            80%        { transform: translate(-8px, 30px) scale(1.04); }
            100%       { transform: translate(0, 0) scale(1); }
        }
        @keyframes lumBgFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Container: full-screen overlay, hidden by default */
        .lum-aurora-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.55s cubic-bezier(0.2, 0, 0, 1);
            /* Soft blue-white base matching LR26 */
            background: linear-gradient(
                180deg,
                #E9EEF6 0%,
                #EFF4FB 30%,
                #F6F9FD 65%,
                #FFFFFF 100%
            );
            border-radius: inherit;
        }
        .keyboard-open .lum-aurora-bg {
            opacity: 1;
        }
        /* Blob 1: large aurora blob top-left */
        .lum-aurora-bg__blob1 {
            position: absolute;
            width: 260px;
            height: 220px;
            top: 5%;
            left: -10%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%,
                rgba(157, 210, 255, 0.55) 0%,
                rgba(157, 210, 255, 0.18) 50%,
                transparent 75%);
            filter: blur(36px);
            animation: lumBlob1 14s ease-in-out infinite;
        }
        /* Blob 2: smaller blob top-right */
        .lum-aurora-bg__blob2 {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 15%;
            right: -5%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%,
                rgba(187, 226, 255, 0.45) 0%,
                rgba(187, 226, 255, 0.12) 55%,
                transparent 78%);
            filter: blur(44px);
            animation: lumBlob2 11s ease-in-out infinite 2.5s;
        }
        /* Blob 3: subtle lower accent */
        .lum-aurora-bg__blob3 {
            position: absolute;
            width: 180px;
            height: 160px;
            bottom: 30%;
            left: 25%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%,
                rgba(140, 195, 255, 0.30) 0%,
                transparent 70%);
            filter: blur(52px);
            animation: lumBlob1 17s ease-in-out infinite 4s reverse;
        }

        /* ── Gesture bar (same as studio .gesture-bar) ── */
        .gesture-bar {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: transparent;
            width: 100%;
        }

        .gesture-bar__handle {
            width: 134px;
            height: 5px;
            background: rgba(0,0,0,0.18);
            border-radius: 100px;
        }


        /* ═══════════════════════════════════════════════════════════════
           SIM KEYBOARD — ported from styles.css (base + video overrides)
           ═══════════════════════════════════════════════════════════════ */

        /* Base keyboard — uses visibility:hidden when closed so offsetHeight is always readable */
        .sim-keyboard {
            display: flex;           /* always in layout so height can be measured */
            visibility: hidden;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            z-index: 100;
            background: #d1d3d9;
            padding: 6px 3px 0;
        }
        .sim-keyboard.visible { visibility: visible; }

        .sim-keyboard__row { display: flex; justify-content: center; gap: 5px; }
        .sim-keyboard__row--offset { padding: 0 14px; }
        .sim-keyboard__row--bottom { padding: 0 3px; }

        .sim-key {
            height: 42px; border-radius: 5px; background: #fff; border: none;
            font-family: 'Google Sans', -apple-system, sans-serif;
            font-size: 22px; font-weight: 400; color: #1c1c1e;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex: 1; max-width: 36px; min-width: 0;
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
            transition: background 0.08s ease, transform 0.08s ease;
            -webkit-tap-highlight-color: transparent; user-select: none; position: relative;
        }
        .sim-key:active { background: #b8bcc4; transform: scale(0.95); }
        .sim-key.popped::after {
            content: attr(data-char); position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%); width: 34px; height: 46px; background: #fff;
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.25); pointer-events: none; z-index: 10;
        }
        .sim-key--dark { background: #abb0ba; font-size: 15px; box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
        .sim-key--dark:active { background: #9a9faa; }
        .sim-key--shift { max-width: 42px; font-size: 18px; }
        .sim-key--backspace { max-width: 42px; font-size: 18px; }
        .sim-key--space { flex: 5; max-width: none; font-size: 15px; letter-spacing: 0.3px; }
        .sim-key--return { flex: 2; max-width: 88px; font-size: 15px; background: #1a73e8; color: #fff; box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .sim-key--return:active { background: #0842a0; }
        .sim-key--num-toggle { flex: 1.5; max-width: 50px; font-size: 15px; }

        .sim-keyboard__suggest {
            display: flex; height: 40px; background: #c8cad0;
            border-radius: 0; margin: 0 -3px; padding: 0; gap: 0.5px; overflow: hidden;
        }
        .sim-suggest {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-family: 'Google Sans', sans-serif; color: #1c1c1e;
            background: transparent; border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .sim-suggest:active { background: rgba(0,0,0,0.06); }
        .sim-suggest--center { border-left: 0.5px solid rgba(0,0,0,0.15); border-right: 0.5px solid rgba(0,0,0,0.15); }

        .sim-keyboard__gesture { height: 22px; display: flex; align-items: center; justify-content: center; background: #d1d3d9; padding-bottom: 2px; }
        .sim-keyboard__gesture-handle { width: 108px; height: 4px; border-radius: 12px; background: #1c1c1e; }

        /* ── Video / Gboard overrides (matches .app-shell--video .sim-*) ── */
        .app-shell--video .sim-keyboard {
            background: #E8EAED; padding: 4px 4px 0; gap: 7px; border-radius: 0;
            /* absolute positioning — sits flush below the keyboard-shifted input */
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 50; transform: translateY(100%);
            transition: transform 500ms cubic-bezier(0.2, 0, 0, 1);
        }
        .app-shell--video .sim-keyboard:not(.visible) { visibility: hidden; }
        .app-shell--video .sim-keyboard.visible {
            transform: translateY(0); transition-delay: 0ms; visibility: visible;
        }

        .app-shell--video .sim-key { height: 46px; border-radius: 8px; background: #fff; font-family: 'Google Sans', 'Roboto', sans-serif; font-size: 20px; font-weight: 400; color: #1f1f1f; box-shadow: 0 1px 0 rgba(0,0,0,0.08); max-width: 34px; }
        .app-shell--video .sim-key:active { background: #D3D3D3; transform: scale(0.96); }
        .app-shell--video .sim-key--dark { background: #DDE0E4; font-size: 14px; box-shadow: 0 1px 0 rgba(0,0,0,0.06); color: #444746; }
        .app-shell--video .sim-key--dark:active { background: #C4C7CC; }
        .app-shell--video .sim-key--shift { max-width: 42px; font-size: 20px; }
        .app-shell--video .sim-key--backspace { max-width: 42px; font-size: 20px; }
        .app-shell--video .sim-key--space { flex: 5; max-width: none; font-size: 14px; letter-spacing: 0.5px; background: #fff; color: #1f1f1f; }
        .app-shell--video .sim-key--return { flex: 2; max-width: none; font-size: 20px; font-weight: 500; background: #D3E3FD; color: #1A73E8; box-shadow: 0 1px 0 rgba(0,0,0,0.06); }
        .app-shell--video .sim-key--return:active { background: #A8C7FA; }
        .app-shell--video .sim-key--num-toggle { flex: 1.5; max-width: 50px; font-size: 14px; }
        .app-shell--video .sim-keyboard__suggest { background: #E8EAED; height: 42px; margin: 0 -3px; gap: 4px; padding: 0 4px; }
        .app-shell--video .sim-suggest { font-family: 'Google Sans', 'Roboto', sans-serif; font-size: 14px; color: #1f1f1f; border-radius: 20px; }
        .app-shell--video .sim-suggest:active { background: rgba(0,0,0,0.08); }
        .app-shell--video .sim-suggest--center { border-left: 1px solid rgba(0,0,0,0.08); border-right: 1px solid rgba(0,0,0,0.08); border-radius: 0; }
        .app-shell--video .sim-keyboard__gesture { background: #E8EAED; height: 24px; }
        .app-shell--video .sim-keyboard__gesture-handle { width: 108px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 12px; }

        /* ── Keyboard OPEN state: LR26 expansion choreography ── */
        .keyboard-open .gesture-bar { display: none !important; }

        /* Heading fades out completely when keyboard opens */
        .keyboard-open .heading {
            opacity: 0;
            transform: translateY(-22px);
            pointer-events: none;
            transition:
                opacity 0.36s cubic-bezier(0.4, 0, 1, 1) 0ms,
                transform 0.42s cubic-bezier(0.3, 0, 0.8, 0.35) 0ms;
        }

        /* Cards ghost to 20% + blur when keyboard opens */
        .keyboard-open .cards-grid {
            opacity: 0.2;
            filter: blur(8px) brightness(1.18) saturate(0.8);
            transform: translateY(-44px);
            pointer-events: none;
            transition:
                opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                filter 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.5s cubic-bezier(0.3, 0, 0.8, 0.35);
        }

        /* Per-card scale — each card sits at a slightly different depth */
        .keyboard-open .style-card {
            transition: transform 0.48s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .keyboard-open .cards-row:nth-child(1) .style-card:nth-child(1) { transform: scale(0.92); }
        .keyboard-open .cards-row:nth-child(1) .style-card:nth-child(2) { transform: scale(0.96); }
        .keyboard-open .cards-row:nth-child(2) .style-card:nth-child(1) { transform: scale(0.89); }
        .keyboard-open .cards-row:nth-child(2) .style-card:nth-child(2) { transform: scale(0.94); }
        .keyboard-open .cards-row:nth-child(3) .style-card:nth-child(1) { transform: scale(0.93); }
        .keyboard-open .cards-row:nth-child(3) .style-card:nth-child(2) { transform: scale(0.91); }
        .keyboard-open .cards-row:nth-child(4) .style-card:nth-child(1) { transform: scale(0.95); }
        .keyboard-open .cards-row:nth-child(4) .style-card:nth-child(2) { transform: scale(0.88); }
        .keyboard-open .cards-row:nth-child(5) .style-card:nth-child(1) { transform: scale(0.90); }
        .keyboard-open .cards-row:nth-child(5) .style-card:nth-child(2) { transform: scale(0.93); }
        .keyboard-open .cards-row:nth-child(n+6) .style-card:nth-child(1) { transform: scale(0.94); }
        .keyboard-open .cards-row:nth-child(n+6) .style-card:nth-child(2) { transform: scale(0.87); }
        /* Restore — cards spring back to full size when keyboard closes */
        .style-card { transition: transform 0.5s cubic-bezier(0.05, 0, 0.2, 1); }


        /* Base restore transitions */
        .heading {
            transition:
                opacity 0.52s cubic-bezier(0.05, 0, 0.2, 1) 0.08s,
                transform 0.58s cubic-bezier(0.05, 0, 0.2, 1) 0.06s;
        }
        .cards-grid {
            transition:
                opacity 0.5s cubic-bezier(0.2, 0, 0, 1) 0.05s,
                filter 0.5s cubic-bezier(0.2, 0, 0, 1) 0.05s,
                transform 0.55s cubic-bezier(0.2, 0, 0, 1) 0.05s;
        }

        /* Input pill expands to full-width rectangle (LR26 focused state) */
        .keyboard-open .video-floating-input {
            transform: translateY(calc(-1 * var(--kb-height, 280px)));
            z-index: 101; pointer-events: auto;
        }

        .keyboard-open .video-floating-input__container {
            width: calc(100% - 16px) !important;
            min-height: 130px !important;
            border-radius: 32px !important;
        }

        .keyboard-open .video-floating-input__bg {
            border-radius: 32px !important;
            /* Deeper aurora glow when focused */
            box-shadow:
                inset 0px -4px 24px 0px rgba(15, 15, 15, 0.12),
                inset -12px -6px 32px 0px var(--aurora-color),
                0 2px 12px rgba(0, 0, 0, 0.06);
            -webkit-mask-image: none;
            mask-image: none;
        }

        .keyboard-open .video-floating-input__container::before {
            border-radius: 32px;
        }

        .keyboard-open .video-floating-input__scrim { opacity: 0; pointer-events: none; }

        .keyboard-open .video-floating-input__content {
            padding: 14px 16px 10px;
            justify-content: flex-start;
        }

        /* Field wraps to its own full-width row at the TOP */
        .keyboard-open .video-floating-input__input-row {
            flex-wrap: wrap;
            align-items: flex-end; /* Keeps mic/buttons at bottom as textarea grows */
            height: auto;
            min-height: 44px;
            padding-bottom: 6px; /* Pads the bottom so 44px buttons center naturally in the 56px default row */
            padding-left: 8px; /* align with placeholder left: 8px */
        }
        .keyboard-open .video-floating-input__field {
            order: -1;              /* pulls field to row 1 */
            flex-basis: 100%;       /* takes full row width */
            width: 100%;
            height: auto;
            min-height: 36px;
            padding-bottom: 4px;   /* breathing room above bottom row */
            align-items: stretch;  /* allows relative textarea to define height */
            position: relative;
        }
        /* 'Ask Gemini' placeholder pinned top-left with slight breathing room */
        .keyboard-open .video-floating-input__placeholder {
            position: absolute;
            left: 8px;
            top: 10px;
            transform: none;
            pointer-events: none;
        }
        /* Textarea: stay relative so it can push its container height dynamically */
        .keyboard-open .video-floating-input__textarea {
            position: relative;
            inset: auto;
            opacity: 1;
            width: 100%;
            height: 34px; /* Base height for single line */
            background: transparent;
            resize: none;
            color: #1a1a1a;
            /* Match placeholder offset exactly — cursor starts at same spot */
            padding: 10px 0 0 8px;
            box-sizing: border-box;
            line-height: 24px; /* same as placeholder line-height */
            overflow: hidden; /* Prevent native scrollbars when jumping */
        }
        /* Mic pushed right so  +  [space]  mic  circle  */
        .keyboard-open #lum-float-mic,
        .keyboard-open #lum2-float-mic,
        .keyboard-open #lum3-float-mic,
        .keyboard-open #lum-loading-float-mic {
            margin-left: auto;
        }
        /* Hide native textarea placeholder — custom span handles it */
        .video-floating-input__textarea::placeholder { color: transparent; }
        /* Dismiss placeholder span when textarea has content */
        .keyboard-open .video-floating-input__textarea:not(:placeholder-shown) ~ .video-floating-input__placeholder,
        .keyboard-open .video-floating-input__textarea:focus:not(:placeholder-shown) ~ .video-floating-input__placeholder { opacity: 0; }

        /* Keyboard synced with input — slides in from bottom together */
        .keyboard-closing.app-shell--video .sim-keyboard.visible {
            transition: transform 500ms cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            transition-delay: 0ms;
            visibility: visible;
        }

        /* ── Keyboard CLOSING state: LR26 reverse choreography ── */
        .keyboard-closing .video-floating-input {
            transition: transform 500ms cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
            z-index: 20;
        }
        .keyboard-closing .video-floating-input__container {
            transition:
                width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                min-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                border-radius 0.35s cubic-bezier(0.4, 0, 0.2, 1) 60ms;
            width: 300px; min-height: 80px; border-radius: 80px;
        }
        .keyboard-closing .video-floating-input__bg {
            transition: border-radius 0.35s cubic-bezier(0.4, 0, 0.2, 1) 60ms;
            border-radius: 80px;
        }
        .keyboard-closing .video-floating-input__container::before {
            transition: border-radius 0.35s cubic-bezier(0.4, 0, 0.2, 1) 60ms;
            border-radius: 80px;
        }
        .keyboard-closing .video-floating-input__scrim {
            transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1) 120ms; opacity: 1;
        }
        .keyboard-closing .video-floating-input__content {
            transition: padding 0.35s cubic-bezier(0.4, 0, 0.2, 1) 40ms; padding: 0 16px;
        }
        /* Textarea stays absolute — instantly invisible so no ghost text on collapse */
        .keyboard-closing .video-floating-input__textarea {
            transition: opacity 0ms; /* instant — prevents double-text flash */
            position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0;
        }
        /* Restore field to inline row layout on closing */
        .keyboard-closing .video-floating-input__field {
            order: 0;
            flex-basis: auto;
            width: auto;
            height: 44px;
            align-items: center;
            padding-bottom: 0;
        }
        .keyboard-closing .video-floating-input__input-row {
            flex-wrap: nowrap;
            align-items: center;
            height: 56px;
        }
        .keyboard-closing #lum-float-mic,
        .keyboard-closing #lum2-float-mic,
        .keyboard-closing #lum3-float-mic,
        .keyboard-closing #lum-loading-float-mic { margin-left: 0; }
        .keyboard-closing .video-floating-input__placeholder {
            position: absolute; left: 0; top: 50%;
            transform: translateY(-50%); opacity: 1;
        }

        /* ─────────────────────────────────────────────────────────────────
           BUTTON SMOOTHNESS — eliminate the layout-reflow jump
           ─────────────────────────────────────────────────────────────────
           flex-wrap / order / margin-left are not animatable, so the browser
           reflows them instantly while the container is still morphing.
           Solution: blank buttons immediately via fill-mode:both, let the
           invisible reflow happen, then fade+slide them in at their new spot.
           ───────────────────────────────────────────────────────────────── */

        /* Opening: buttons materialise from slightly below into the bottom row */
        .keyboard-open .video-floating-input__action-btn {
            animation: lumBtnOpen 320ms cubic-bezier(0.2, 0, 0, 1) 90ms both;
        }

        /* Closing: buttons rise slightly and fade in back to the inline row */
        .keyboard-closing .video-floating-input__action-btn {
            animation: lumBtnClose 380ms cubic-bezier(0.2, 0, 0, 1) 160ms both;
        }

        @keyframes lumBtnOpen {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.88);
                filter: blur(2px);
            }
            60% {
                filter: blur(0);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes lumBtnClose {
            from {
                opacity: 0;
                transform: translateY(-6px) scale(0.90);
                filter: blur(1px);
            }
            50% {
                filter: blur(0);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }


        /* ── Clockface (live time) ── */
        #live-time {
            font-variant-numeric: tabular-nums;
        }

        /* ═══════════════════════════════════════════════════════════════
           PROMPT SUBMISSION ANIMATION SEQUENCE
           ─ Phase 0: .submitting — keyboard gone, input compacts
           ─ Phase 1: .blurring — templates drift into dreamy blur
           ─ Phase 2: .revealing — templates + backdrop rise in lockstep
           ─ Phase 3: .generating — fully revealed, image renders in
           ═══════════════════════════════════════════════════════════════ */

        /* ── Compact input pill (replaces keyboard-open expanded state) ── */
        /* When .submitting: input collapses from expanded → small compact pill */
        .submitting .video-floating-input__container {
            width: 220px !important;
            min-height: 52px !important;
            border-radius: 80px !important;
            transition:
                width 380ms cubic-bezier(0.4, 0, 0.2, 1),
                min-height 380ms cubic-bezier(0.4, 0, 0.2, 1),
                border-radius 380ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submitting .video-floating-input__bg {
            border-radius: 80px !important;
            transition: border-radius 380ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submitting .video-floating-input__container::before {
            border-radius: 80px !important;
            transition: border-radius 380ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submitting .video-floating-input__content {
            padding: 0 16px;
            transition: padding 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submitting .video-floating-input__field {
            order: 0; flex-basis: auto; width: auto; height: 44px;
            align-items: center; padding-bottom: 0;
        }
        .submitting .video-floating-input__input-row {
            flex-wrap: nowrap; align-items: center; height: 52px;
        }
        .submitting .video-floating-input__scrim { opacity: 0; pointer-events: none; }
        /* Hide mic + add during compact/submitting */
        .submitting #lum-float-add,
        .submitting #lum-float-mic {
            opacity: 0; pointer-events: none;
            transform: scale(0.7);
            transition: opacity 200ms ease, transform 200ms ease;
        }
        /* Show a compact 'generating' label in the pill */
        .submitting .video-floating-input__placeholder {
            position: relative; left: auto; top: auto; transform: none;
            color: rgba(0,0,0,0.42); font-size: 15px; opacity: 1;
            pointer-events: none; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 100px;
        }
        .submitting .video-floating-input__textarea { opacity: 0; }

        /* Compact pill gently pulses with the aurora while generating */
        @keyframes lumCompactPulse {
            0%, 100% { box-shadow:
                inset 0px -4px 24px 0px rgba(15,15,15,0.08),
                inset -12px -6px 32px 0px var(--aurora-color),
                0 2px 12px rgba(0,0,0,0.06); }
            50% { box-shadow:
                inset 0px -4px 32px 0px rgba(15,15,15,0.12),
                inset -18px -8px 42px 0px var(--aurora-color),
                0 4px 20px rgba(0,0,0,0.10); }
        }
        .submitting .video-floating-input__bg {
            animation: lumCompactPulse 2.4s ease-in-out infinite;
        }

        /* ── Phase 1: BLUR — templates drift into dreaminess ── */
        /* Slow, lingering blur — the viewer watches templates dissolve */
        .blurring .heading {
            filter: blur(6px);
            opacity: 0.6;
            transition:
                filter 600ms cubic-bezier(0.4, 0, 0.2, 1),
                opacity 600ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blurring .cards-grid {
            filter: blur(8px);
            opacity: 0.5;
            transition:
                filter 700ms cubic-bezier(0.4, 0, 0.2, 1) 80ms,
                opacity 700ms cubic-bezier(0.4, 0, 0.2, 1) 80ms;
        }

        /* ── Phase 2: REVEAL — templates rise, backdrop follows in lockstep ── */
        /* The scroll container (heading + cards) peels upward */
        .revealing #lum-content {
            transform: translateY(-105%);
            opacity: 0;
            filter: blur(16px);
            transition:
                transform 820ms cubic-bezier(0.4, 0, 0.2, 1) 50ms,
                opacity 500ms cubic-bezier(0.4, 0, 0.2, 1) 50ms,
                filter 500ms cubic-bezier(0.4, 0, 0.2, 1) 50ms;
        }
        
        /* The input pill itself slides to the bottom with the result */
        .revealing .video-floating-input {
            transition: transform 820ms cubic-bezier(0.4, 0, 0.2, 1) 50ms;
            transform: translateY(0);
        }
        /* Result panel is ALREADY visible (placed at y=0 before reveal starts) */
        /* It rides up with its content from behind the templates */

        /* ── Phase 3: GENERATING — fully revealed, image animates in ── */
        .generating #lum-content {
            transform: translateY(-105%);
            opacity: 0;
            filter: blur(24px);
            pointer-events: none;
            transition: none; /* snap, already there */
        }
        /* .generating stops the sequence and turns the pill text to "Generating..." */
        .generating .video-floating-input__morph-container #lum-float-record { opacity: 0; pointer-events: none; }
        .generating .video-floating-input__morph-container .video-floating-input__send-btn { opacity: 0; pointer-events: none; } /* Pure read-only state */

        /* ══════════════════════════════════════════════════════════════
           CINEMATIC CROSSFADE — Apple · Buck · Frog Design quality
           ──────────────────────────────────────────────────────────
           The immersive background transitions as a single living environment.
           It starts matching the template screen's light aurora and morphs
           through a warm mid-tone (the UI memory moment) into deep space.
           ══════════════════════════════════════════════════════════ */

        /* CSS @property for hardware-acceleratable color morphing */
        @property --lum-bg-from {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(240, 245, 252, 1);
        }
        @property --lum-orb1-color {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(157, 210, 255, 0.55);
        }
        @property --lum-orb2-color {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(187, 226, 255, 0.45);
        }
        @property --lum-orb3-color {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(200, 220, 255, 0.30);
        }

        /* ── Result overlay panel ── */
        .lum-result {
            position: absolute;
            inset: 0;
            /* starts BEHIND templates (lower z-index than cards-scroll:10 and toolbar:15) */
            z-index: 5;
            overflow: hidden;
            pointer-events: none;
            /* Starts transparent — key decision: matches the light phone background
               so there's zero visual discontinuity when templates begin peeling away */
            background: transparent;
            /* Starts off-screen below */
            transform: translateY(100%);
            border-radius: inherit;
        }

        /* ── The cinematic environment layer ── */
        /* This sits between the dark base and the media content.
           It's the crossfade bridge from light to dark. */
        .lum-result__env {
            position: absolute;
            inset: 0;
            z-index: 0;
            /* Light warm-white — perceptually matches the template screen background */
            background: rgba(253, 252, 252, 1);
            /* No opacity, starts fully visible — it IS the background initially */
            transition: none;
        }

        /* The three cinematic nebula orbs — mirror the template screen's aurora blobs,
           then bloom into vast cosmic forms during the reveal */
        .lum-result__orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            /* Starts matching the template-screen aurora blob sizes */
        }

        /* Orb 1: The primary bloom — transitions toward upper-left */
        .lum-result__orb1 {
            /* Start: matches .lum-aurora-bg__blob1 size/position */
            width: 260px;
            height: 220px;
            top: 5%;
            left: -10%;
            background: radial-gradient(ellipse at 45% 40%,
                var(--lum-orb1-color) 0%,
                transparent 70%);
            filter: blur(38px);
            mix-blend-mode: normal;
            animation: lumOrb1Drift 18s ease-in-out infinite;
        }

        /* Orb 2: Secondary bloom — right side */
        .lum-result__orb2 {
            /* Start: matches .lum-aurora-bg__blob2 size/position */
            width: 200px;
            height: 200px;
            top: 15%;
            right: -5%;
            background: radial-gradient(ellipse at 55% 45%,
                var(--lum-orb2-color) 0%,
                transparent 70%);
            filter: blur(46px);
            animation: lumOrb2Drift 13s ease-in-out infinite 1.5s;
        }

        /* Orb 3: Tertiary accent — lower centre */
        .lum-result__orb3 {
            width: 180px;
            height: 160px;
            bottom: 28%;
            left: 18%;
            background: radial-gradient(ellipse at 50% 55%,
                var(--lum-orb3-color) 0%,
                transparent 68%);
            filter: blur(54px);
            animation: lumOrb3Drift 22s ease-in-out infinite 3s reverse;
        }


        /* Subtle noise/grain overlay for cinematic texture */
        .lum-result__grain {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            mix-blend-mode: overlay;
            transition: opacity 1200ms cubic-bezier(0.16, 1, 0.3, 1) 400ms;
        }

        /* === CROSSFADE ANIMATION KEYFRAMES === */

        /* The environment base color: light aurora → warm rose mid → deep indigo */
        /* This gives the perceptual 'golden hour to night' feeling */
        @keyframes lumEnvCrossfade {
            0%   {
                background: linear-gradient(
                    180deg,
                    #EFF4FA 0%,
                    #F3F7FD 40%,
                    #F8FBFF 75%,
                    #FFFFFF 100%
                );
            }
            /* The 'memory moment' — a brief warm blush, like light fading at dusk
               This is the Buck/Apple signature: never go direct, always through a mid-state */
            18% {
                background: linear-gradient(
                    180deg,
                    #D8E8F6 0%,
                    #C8D8EE 30%,
                    #D4DCF0 65%,
                    #E0E8F8 100%
                );
            }
            /* Now deepening, pulling into the indigo-violet register */
            40% {
                background: linear-gradient(
                    180deg,
                    #1a1f3a 0%,
                    #141830 30%,
                    #0e1228 65%,
                    #08091e 100%
                );
            }
            /* Settle into final deep-space value */
            100% {
                background: linear-gradient(
                    180deg,
                    #070b1c 0%,
                    #060917 30%,
                    #050814 65%,
                    #040710 100%
                );
            }
        }

        /* Orb color: pale blue-white → electric indigo → settled nebula violet */
        @keyframes lumOrb1Reveal {
            0%   { --lum-orb1-color: rgba(180, 215, 255, 0.55);
                   width: 260px; height: 220px; top: 5%; left: -10%;
                   filter: blur(38px); }
            /* Blush moment: orb warms before cooling to space-blue */
            20%  { --lum-orb1-color: rgba(130, 160, 255, 0.6);
                   width: 340px; height: 300px; top: -5%; left: -15%;
                   filter: blur(55px); }
            /* Bloom: expand to cinematic nebula scale */
            55%  { --lum-orb1-color: rgba(80, 120, 255, 0.5);
                   width: 520px; height: 460px; top: -20%; left: -20%;
                   filter: blur(80px); }
            /* Settle */
            100% { --lum-orb1-color: rgba(60, 100, 230, 0.38);
                   width: 480px; height: 420px; top: -18%; left: -18%;
                   filter: blur(90px); }
        }

        @keyframes lumOrb2Reveal {
            0%   { --lum-orb2-color: rgba(187, 226, 255, 0.45);
                   width: 200px; height: 200px; top: 15%; right: -5%;
                   filter: blur(46px); }
            22%  { --lum-orb2-color: rgba(160, 120, 255, 0.55);
                   width: 280px; height: 260px; top: 5%; right: -12%;
                   filter: blur(62px); }
            60%  { --lum-orb2-color: rgba(130, 80, 255, 0.48);
                   width: 420px; height: 380px; top: -10%; right: -22%;
                   filter: blur(88px); }
            100% { --lum-orb2-color: rgba(110, 60, 220, 0.36);
                   width: 390px; height: 350px; top: -8%; right: -20%;
                   filter: blur(95px); }
        }

        @keyframes lumOrb3Reveal {
            0%   { --lum-orb3-color: rgba(200, 220, 255, 0.30);
                   width: 180px; height: 160px; bottom: 28%; left: 18%;
                   filter: blur(54px); }
            30%  { --lum-orb3-color: rgba(80, 180, 220, 0.42);
                   width: 260px; height: 240px; bottom: 20%; left: 10%;
                   filter: blur(68px); }
            65%  { --lum-orb3-color: rgba(40, 140, 200, 0.34);
                   width: 360px; height: 340px; bottom: 5%; left: -5%;
                   filter: blur(85px); }
            100% { --lum-orb3-color: rgba(30, 120, 190, 0.28);
                   width: 340px; height: 320px; bottom: 6%; left: -4%;
                   filter: blur(90px); }
        }

        /* Steady-state orbital drift (infinite, after reveal) */
        @keyframes lumOrb1Drift {
            0%         { transform: translate(0, 0) scale(1);      }
            25%        { transform: translate(22px, -32px) scale(1.06); }
            55%        { transform: translate(-14px, 24px) scale(0.96); }
            80%        { transform: translate(18px, 10px) scale(1.04); }
            100%       { transform: translate(0, 0) scale(1);      }
        }
        @keyframes lumOrb2Drift {
            0%         { transform: translate(0, 0) scale(1);       }
            30%        { transform: translate(-24px, 18px) scale(1.08); }
            60%        { transform: translate(18px, -22px) scale(0.94); }
            85%        { transform: translate(-10px, 28px) scale(1.04); }
            100%       { transform: translate(0, 0) scale(1);       }
        }
        @keyframes lumOrb3Drift {
            0%         { transform: translate(0, 0) scale(1);      }
            35%        { transform: translate(16px, 24px) scale(1.09); }
            65%        { transform: translate(-20px, -14px) scale(0.92); }
            90%        { transform: translate(8px, 18px) scale(1.05); }
            100%       { transform: translate(0, 0) scale(1);      }
        }

        /* === REVEAL STATE TRIGGERS === */
        /* When the result panel is placed, the environment crossfade begins */
        .lum-result.is-placed .lum-result__env {
            /* Light template background is preserved — no override needed at place time.
               The env darkens via the revealing animation, not at place time. */
            background: rgba(253, 252, 252, 1);
        }

        .lum-result.is-placed .lum-result__orb1 {
            animation:
                lumOrb1Reveal 1600ms cubic-bezier(0.16, 1, 0.3, 1) forwards,
                lumOrb1Drift   18s ease-in-out infinite 1600ms;
        }
        .lum-result.is-placed .lum-result__orb2 {
            animation:
                lumOrb2Reveal 1800ms cubic-bezier(0.16, 1, 0.3, 1) 80ms forwards,
                lumOrb2Drift   13s ease-in-out infinite 1800ms;
        }
        .lum-result.is-placed .lum-result__orb3 {
            animation:
                lumOrb3Reveal 2000ms cubic-bezier(0.16, 1, 0.3, 1) 160ms forwards,
                lumOrb3Drift   22s ease-in-out infinite 2000ms;
        }

        /* Grain materializes as environment darkens */
        .lum-result.is-placed .lum-result__grain {
            opacity: 1;
        }

        /* Result is in place behind templates */
        .lum-result.is-placed {
            transform: translateY(0);
            transition: none;
        }

        /* Once revealed, result rises above everything */
        .lum-result.is-revealed {
            pointer-events: auto;
            z-index: 18;
        }

        /* The generated image / loading gradient */
        .lum-result__media {
            position: absolute;
            inset: -10%; /* bleed prevents blur-edge artifacts */
            z-index: 3;  /* above env(0) + orbs(1) + grain(2) */
            background-size: cover;
            background-position: center;
            /* Transparent: the living env+orb system shows through while loading */
            background-color: transparent;
            opacity: 0;
            filter: blur(40px) brightness(0.65);
            transform: scale(1.14);
            /* Drift powered by Three.js spring engine — no CSS animation needed */
            transition:
                opacity 500ms cubic-bezier(0.4, 0, 0.2, 1),
                filter 3600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms,
                transform 3600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms;
        }

        /* Loading: warm photographic blur — looks like an out-of-focus photo forming.
           Color palette: warm gold highlights, dusty mid, deep shadows at base.
           NOT neon — these gradients read as a real image being resolved.           */
        .lum-result__media.is-loading {
            opacity: 1;
            background-image:
                /* Bright highlight zone — top center, like a sky or light source */
                radial-gradient(ellipse 110% 60% at 50% 8%,  rgba(235, 220, 195, 0.95) 0%, transparent 55%),
                /* Warm golden-brown mid zone — left */
                radial-gradient(ellipse 75%  65% at 22% 52%, rgba(155, 130, 90,  0.80) 0%, transparent 62%),
                /* Dusty purple-brown mid — right */
                radial-gradient(ellipse 65%  70% at 75% 48%, rgba(115, 98,  130, 0.65) 0%, transparent 60%),
                /* Rich dark shadow base — bottom */
                radial-gradient(ellipse 100% 55% at 50% 96%, rgba(45,  48,  58,  0.80) 0%, transparent 68%);
            background-color: rgba(190, 172, 145, 0.5); /* warm neutral base         */
            animation: lumShimmerPulse 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        /* Morphing Orbs Layer — Kinetic Continuity */
        .lum-result__media::before,
        .lum-result__media::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            transition: opacity 1200ms ease;
            z-index: 1;
        }

        .lum-result__media.is-loading::before {
            opacity: 1;
            width: 200px;
            height: 200px;
            top: 20%;
            left: 20%;
            /* Warm amber — reads like skin or fabric catching light */
            background: rgba(200, 160, 90, 0.28);
            animation: lumOrbMorph1 9s ease-in-out infinite alternate;
        }

        .lum-result__media.is-loading::after {
            opacity: 1;
            width: 240px;
            height: 240px;
            bottom: 18%;
            right: 18%;
            /* Deep slate-blue — reads like shadow or depth in an editorial shot */
            background: rgba(70, 80, 120, 0.30);
            animation: lumOrbMorph2 11s ease-in-out infinite alternate;
        }

        @keyframes lumOrbMorph1 {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(40px, -20px) scale(1.15); }
            66%  { transform: translate(-20px, 40px) scale(0.9); }
            100% { transform: translate(10px, -10px) scale(1.05); }
        }

        @keyframes lumOrbMorph2 {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(-50px, 30px) scale(1.1); }
            66%  { transform: translate(30px, -40px) scale(0.95); }
            100% { transform: translate(-10px, 10px) scale(1.05); }
        }

        /* Image ready: burst through the blur into crystalline clarity */
        /* Background stays blurry */
        .lum-result__media.is-loaded {
            filter: blur(40px) brightness(1);
            opacity: 1;
        }

        /* Sharp image on surface */
        .lum-result__media-surface {
            position: absolute;
            /* Mathematically center the image vertically by equalizing top/bottom constraints 
               so it clears both the top navigation header and the bottom floating prompt pill */
            inset: 140px 0 140px;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            opacity: 0;
            transform: scale(0.92);
            /* Prime-number stagger (Sovereign Motion Architect) — opacity leads, scale follows at 53ms.
               Entering the view later will apply a delay (see .is-loaded below) */
            transition:
                opacity   400ms cubic-bezier(0.4, 0, 1, 1),
                transform 400ms cubic-bezier(0.4, 0, 1, 1);
        }

        .lum-surface-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 40px;
            /* Cinematic depth — multi-layer shadow gives image physical presence */
            box-shadow:
                0 48px 120px rgba(0,0,0,0.72),
                0 12px  40px rgba(0,0,0,0.48),
                0  0  0 0.5px rgba(255,255,255,0.08);
            filter: brightness(1.03) saturate(1.06);
        }

        .lum-result.is-loaded .lum-result__media-surface {
            opacity: 1;
            transform: scale(1);
            /* Enter transition: Wait 250ms for loader text to fade, then bloom in */
            transition:
                opacity   680ms cubic-bezier(0.16, 1, 0.3, 1) 250ms,
                transform 1100ms cubic-bezier(0.16, 1, 0.3, 1) 250ms;
        }

        /* Shimmer pulse: gentle focus-shift breathing — reads as resolving, not strobing */
        @keyframes lumShimmerPulse {
            0%   { opacity: 0.88; filter: blur(26px) brightness(1.0)  saturate(1.0);  transform: scale(1.07); }
            40%  { opacity: 0.96; filter: blur(22px) brightness(1.04) saturate(1.06); transform: scale(1.05); }
            70%  { opacity: 0.90; filter: blur(28px) brightness(0.98) saturate(0.97); transform: scale(1.08); }
            100% { opacity: 0.88; filter: blur(26px) brightness(1.0)  saturate(1.0);  transform: scale(1.07); }
        }

        /* Back button — Hidden per user request, preferring global toolbar */
        .lum-result__back {
            display: none !important;
            position: absolute;
